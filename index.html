<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profit Point · premium POS</title>
    <!-- Font Awesome 6 + Google Fonts Inter + Chart.js 4 + Cropper.js + jsPDF + autoTable -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a1929;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
        }
        #phoneApp {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            height: 100dvh;
            background: #ffffff;
            box-shadow: 0 20px 50px rgba(0, 40, 70, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        /* High-quality wallpaper – sharp & crisp */
        .wallpaper-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            background: #0a1929;
        }
        .wallpaper-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: var(--wallpaper-opacity, 0.3);
            transition: opacity 0.2s ease;
            pointer-events: none;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            transform: translateZ(0);
            backface-visibility: hidden;
            filter: brightness(1.05) contrast(1.02); /* extra pop */
        }

        /* Header — more polished arrangement */
        .app-header {
            background: rgba(18, 28, 40, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 0.7rem 1rem 0.6rem;
            border-bottom: 1px solid rgba(6,198,212,0.25);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }
        .header-top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.4rem;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 800;
            font-size: 1.2rem;
            color: white;
            text-shadow: 0 2px 6px rgba(0,0,0,0.3);
            letter-spacing: -0.5px;
            background: rgba(0,0,0,0.2);
            padding: 0.2rem 1rem 0.2rem 0.4rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo-icon {
            background: #06c6d4;
            color: white;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(6,198,212,0.3);
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .icon-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(6,198,212,0.3);
            color: #06c6d4;
            border-radius: 40px;
            padding: 0.4rem 0.9rem;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s ease;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }
        .icon-btn:hover {
            background: rgba(6,198,212,0.2);
            border-color: rgba(6,198,212,0.6);
            transform: translateY(-1px);
        }
        .date-badge {
            background: rgba(6,198,212,0.2);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            border: 1px solid rgba(6,198,212,0.4);
            color: white;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .brand-user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.3rem;
        }
        .brand-chip {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(6px);
            padding: 0.2rem 1rem 0.2rem 0.2rem;
            border-radius: 60px;
            border: 1.5px solid rgba(6,198,212,0.4);
            max-width: 60%;
        }
        .shop-logo-preview {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #1a2332;
            overflow: hidden;
            border: 2px solid #06c6d4;
            box-shadow: 0 4px 10px rgba(6,198,212,0.3);
            flex-shrink: 0;
        }
        .shop-logo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .shop-name-display {
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            text-shadow: 0 2px 4px #00000050;
            max-width: 130px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-greeting-modern {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(6px);
            padding: 0.2rem 0.2rem 0.2rem 0.8rem;
            border-radius: 60px;
            border: 1px solid rgba(6,198,212,0.3);
            max-width: 48%;
        }
        .user-info-left {
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .user-avatar-mini {
            width: 32px;
            height: 32px;
            border-radius: 32px;
            background: #06c6d4;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(6,198,212,0.2);
            flex-shrink: 0;
        }
        .user-avatar-mini img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #logoutLinkMobile {
            color: white;
            text-decoration: none;
            background: rgba(0,0,0,0.4);
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid #06c6d450;
            white-space: nowrap;
        }

        /* Scrollable main content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.3rem 1.1rem 1rem;
            background: rgba(248, 250, 252, 0.9);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            scrollbar-width: thin;
            scrollbar-color: rgba(6,198,212,0.3) transparent;
            position: relative;
            z-index: 5;
        }
        /* rest of styles identical to original, only header changed + fullscreen toggle + wallpaper sharpness */
        .main-content::-webkit-scrollbar {
            width: 6px;
        }
        .main-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .main-content::-webkit-scrollbar-thumb {
            background: rgba(6,198,212,0.3);
            border-radius: 3px;
        }
        .main-content::-webkit-scrollbar-thumb:hover {
            background: rgba(6,198,212,0.5);
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0.6rem 0.4rem 0.5rem;
            border-top: 1px solid rgba(6,198,212,0.15);
            box-shadow: 0 -12px 30px rgba(6,198,212,0.08);
            border-radius: 28px 28px 0 0;
            flex-shrink: 0;
            z-index: 20;
            position: relative;
        }
        .nav-item-mobile {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.7rem;
            color: #708598;
            padding: 8px 0;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.35, 0.46, 0.3, 0.46);
            animation: slideUp 0.5s ease backwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .nav-item-mobile:nth-child(1) { animation-delay: 0.1s; }
        .nav-item-mobile:nth-child(2) { animation-delay: 0.2s; }
        .nav-item-mobile:nth-child(3) { animation-delay: 0.3s; }
        .nav-item-mobile:nth-child(4) { animation-delay: 0.4s; }
        .nav-item-mobile:nth-child(5) { animation-delay: 0.5s; }
        .nav-item-mobile:nth-child(6) { animation-delay: 0.6s; }
        .nav-item-mobile i {
            font-size: 1.6rem;
            margin-bottom: 4px;
            transition: all 0.3s ease;
            color: #708598;
        }
        .nav-item-mobile:hover {
            color: #06c6d4;
        }
        .nav-item-mobile:hover i {
            color: #06c6d4;
            transform: scale(1.08);
        }
        .nav-item-mobile.active {
            background: rgba(6,198,212,0.12);
            color: #06c6d4;
            box-shadow: inset 0 0 0 2px #06c6d4;
        }
        .nav-item-mobile.active i {
            color: #06c6d4;
            transform: scale(1.2);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1.2); }
            50% { transform: scale(1.3); }
        }
        .cart-fab {
            position: sticky;
            bottom: 0.8rem;
            z-index: 100;
            display: flex;
            justify-content: center;
            pointer-events: none;
            margin-top: 1rem;
        }
        .cart-btn {
            background: #06c6d4;
            color: white;
            border: 1px solid #06c6d4;
            border-radius: 80px;
            padding: 1.1rem 2.4rem;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 0 18px 40px rgba(6,198,212,0.35);
            display: inline-flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            pointer-events: auto;
        }
        .cart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 50px rgba(6,198,212,0.4);
            background: #05a8b3;
        }
        .cart-btn:active {
            transform: scale(0.96) translateY(0);
            box-shadow: 0 12px 25px rgba(6,198,212,0.25);
        }
        .cart-badge {
            background: #1a2332;
            color: #06c6d4;
            border-radius: 60px;
            padding: 0.2rem 1rem;
            font-size: 1.1rem;
        }

        /* Modal overlays (unchanged) */
        .modal-overlay, .cart-modal-overlay, .auth-overlay, .crop-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300000;
            padding: 1.5rem;
            animation: fadeScale 0.3s ease;
        }
        @keyframes fadeScale {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .crop-modal-overlay { z-index: 400000; background: rgba(0,0,0,0.8); }
        .cart-modal-card, .modal-card, .crop-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 2.2rem 1.8rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 50px 100px rgba(0, 30, 50, 0.5), 0 20px 40px rgba(0, 30, 50, 0.2);
            border: 1px solid rgba(255,255,240,0.8);
            max-height: 85vh;
            overflow-y: auto;
        }
        .crop-card { max-width: 400px; text-align: center; }
        .crop-container { width: 100%; max-height: 50vh; margin: 1rem 0; }
        #cropImage { max-width: 100%; max-height: 50vh; }

        /* Auth, product grid etc – keep exactly as before */
        .auth-overlay { background: rgba(0,0,0,0.3); backdrop-filter: blur(12px); }
        .auth-card-modern {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(30px);
            border-radius: 56px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 40px 70px rgba(0,10,20,0.4);
            border: 1px solid rgba(255,255,255,0.7);
            animation: slideSoft 0.5s;
        }
        @keyframes slideSoft {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .auth-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem; }
        .auth-logo-icon {
            background: #1a2332; color: #06c6d4; width: 90px; height: 90px; border-radius: 45px;
            display: flex; align-items: center; justify-content: center; font-size: 3.2rem;
            margin-bottom: 1.5rem; box-shadow: 0 18px 40px rgba(6,198,212,0.15), 0 0 0 1px rgba(6,198,212,0.2) inset;
            border: 2px solid rgba(6,198,212,0.3); position: relative;
        }
        .auth-logo-icon::before {
            content: ''; position: absolute; inset: 0; border-radius: 45px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent 70%);
            pointer-events: none;
        }
        .auth-header h2 { font-size: 2.4rem; font-weight: 700; color: #1a2332; letter-spacing: -0.8px; line-height: 1.2; }
        .auth-field {
            background: rgba(255,255,255,0.75); backdrop-filter: blur(8px); border-radius: 60px;
            padding: 0.2rem 1.6rem; margin-bottom: 1.3rem; border: 2px solid rgba(6,198,212,0.2);
            transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .auth-field:focus-within {
            border-color: #06c6d4; background: rgba(255,255,255,0.95); transform: scale(1.02);
            box-shadow: 0 12px 30px rgba(6,198,212,0.15);
        }
        .auth-field input, .auth-field select {
            width: 100%; border: none; background: transparent; padding: 1rem 0; font-size: 1rem;
            outline: none; color: #1a2332;
        }
        .auth-field input::placeholder { color: #93a5b3; }
        .auth-btn {
            background: #06c6d4; color: white; border: 1px solid #06c6d4; border-radius: 60px;
            padding: 1.2rem; width: 100%; font-weight: 700; font-size: 1.1rem; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 15px 35px rgba(6,198,212,0.25);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin: 1.8rem 0 1rem;
        }
        .auth-btn:hover { background: #05a8b3; box-shadow: 0 18px 40px rgba(6,198,212,0.35); transform: translateY(-2px); }
        .auth-btn:active { transform: scale(0.96) translateY(0); box-shadow: 0 10px 20px rgba(6,198,212,0.2); }
        .auth-switch { text-align: center; color: #1a2332; cursor: pointer; font-weight: 500; font-size: 0.95rem; padding: 0.5rem; opacity: 0.9; transition: 0.2s; }
        .auth-switch:hover { opacity: 1; text-decoration: underline; }
        .product-grid-mobile {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1rem 0;
            animation: fadeInGrid 0.5s ease;
        }
        @keyframes fadeInGrid { from { opacity: 0; } to { opacity: 1; } }
        .product-tile-mobile {
            position: relative; width: 100%; aspect-ratio: 4/5; cursor: pointer;
            border-radius: 28px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid rgba(6,198,212,0.1); transition: all 0.25s cubic-bezier(0.35, 0.46, 0.3, 0.46);
            animation: fadeIn 0.4s ease backwards; background: linear-gradient(135deg, #f0f4f8 0%, #e8ecf2 100%);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .product-tile-mobile:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.2), 0 8px 16px rgba(6,198,212,0.25), 0 2px 8px rgba(0,0,0,0.1);
            transform: translateY(-5px);
            border-color: rgba(6,198,212,0.3);
        }
        .product-tile-mobile:hover .product-image-mobile { transform: scale(1.08); }
        .product-tile-mobile::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0.6) 100%);
            pointer-events: none; z-index: 2;
        }
        .product-image-mobile {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8ecf2 100%);
            display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
        }
        .product-image-mobile img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .product-price-mobile { font-weight: 900; color: #06c6d4; font-size: 1.1rem; letter-spacing: -0.3px; word-break: break-word; line-height: 1.3; }
        .product-name-mobile {
            position: absolute; bottom: 3.2rem; left: 0.8rem; right: 0.8rem; z-index: 3;
            font-weight: 700; font-size: 0.9rem; color: white; line-height: 1.2; word-break: break-word;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .product-price-mobile {
            position: absolute; bottom: 1.8rem; left: 0.8rem; right: 0.8rem; z-index: 3;
            font-weight: 900; color: #fedb9f; font-size: 1.15rem; letter-spacing: -0.3px; word-break: break-word;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }
        .stock-badge-mobile {
            position: absolute; bottom: 0.6rem; left: 0.8rem; right: 0.8rem; z-index: 3;
            background: rgba(6,198,212,0.95); border-radius: 20px; padding: 0.4rem 0.8rem;
            font-size: 0.7rem; display: inline-block; font-weight: 700; color: white;
            border: none; max-width: 100%; white-space: normal; word-break: break-word;
            box-shadow: 0 8px 20px rgba(6,198,212,0.4), 0 2px 8px rgba(0,0,0,0.15);
        }
        /* All other styles from original kept intact (chips, payment, etc) */
        .chip {
            background: rgba(6,198,212,0.12); border-radius: 40px; padding: 0.7rem 1.3rem;
            cursor: pointer; font-weight: 600; border: 2px solid rgba(6,198,212,0.3);
            display: inline-block; transition: all 0.25s ease; font-size: 0.85rem; color: #06c6d4;
        }
        .chip:hover { background: rgba(6,198,212,0.2); border-color: rgba(6,198,212,0.5); transform: translateY(-2px); }
        .chip:active { transform: scale(0.92); }
        .chip.active { background: #06c6d4; color: white; border-color: #06c6d4; box-shadow: 0 8px 18px rgba(6,198,212,0.3); }
        .payment-option {
            background: white; border-radius: 40px; padding: 0.8rem 1.3rem; border: 2px solid #c8d4de;
            cursor: pointer; display: inline-block; transition: all 0.25s ease; font-size: 0.85rem;
            font-weight: 600; color: #506578;
        }
        .payment-option:hover { border-color: rgba(6,198,212,0.4); background: rgba(6,198,212,0.05); }
        .payment-option:active { transform: scale(0.92); }
        .payment-option.active { background: #06c6d4; color: white; border-color: #06c6d4; box-shadow: 0 8px 18px rgba(6,198,212,0.3); }
        .btn-small {
            background: #06c6d4; color: white; border: 1px solid #06c6d4; border-radius: 60px;
            padding: 0.8rem 1.5rem; font-weight: 700; cursor: pointer; font-size: 0.85rem;
            transition: all 0.25s ease;
        }
        .btn-small:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(6,198,212,0.25); background: #05a8b3; }
        .btn-small:active { transform: scale(0.94) translateY(0); }
        #toastContainer {
            position: fixed; bottom: 90px; left: 16px; right: 16px; max-width: 400px;
            margin: 0 auto; z-index: 999999;
        }
        .toast {
            background: rgba(26,35,50,0.95); color: white; padding: 15px 24px;
            border-radius: 60px; font-weight: 600; box-shadow: 0 18px 40px rgba(0,0,0,0.3);
            border-left: 5px solid #06c6d4; backdrop-filter: blur(12px);
            display: flex; align-items: center; gap: 12px; animation: slideIn 0.3s ease;
            margin-bottom: 8px;
        }
        .toast.error { border-left-color: #d32f2f; }
        .toast.success { border-left-color: #2ecc71; }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .trial-badge {
            background: rgba(6,198,212,0.15); color: #06c6d4; border-radius: 40px;
            padding: 0.4rem 1.3rem; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.5px;
            text-transform: uppercase; box-shadow: 0 4px 12px rgba(6,198,212,0.1);
            border: 1px solid rgba(6,198,212,0.3);
        }
        .wallpaper-control {
            display: flex; align-items: center; gap: 12px; margin: 1.2rem 0;

                const lic = localStorage.getItem(LICENSE_KEY);

            }
            
            function saveLicense(lic) {
                localStorage.setItem(LICENSE_KEY, JSON.stringify(lic));
            }

            function isLicenseExpired() {
                const lic = getLicense();
                if (!lic) return false;
                const elapsed = Date.now() - lic.start;
                return elapsed >= lic.duration;
            }

            function checkLicenseValid() {
                const lic = getLicense();
                if (!lic) {
                    saveLicense({ type: 'trial', start: Date.now(), duration: TRIAL_DURATION });
                    return true;
                }
                if (lic.type === 'trial') {
                    return (Date.now() - lic.start) < lic.duration;
                }
                if (lic.type === 'full') {
                    return (Date.now() - lic.start) < lic.duration;
                }
                return false;
            }

            function getRemainingMs() {
                const lic = getLicense();
                if (!lic) return 0;
                const remaining = lic.duration - (Date.now() - lic.start);
                return remaining > 0 ? remaining : 0;
            }

            function formatRemaining(ms) {
                if (ms <= 0) return 'Expired';
                const days = Math.floor(ms / (24 * 3600 * 1000));
                const hours = Math.floor((ms % (24 * 3600 * 1000)) / (3600 * 1000));
                const minutes = Math.floor((ms % (3600 * 1000)) / (60 * 1000));
                if (days > 0) return `${days}d ${hours}h`;
                if (hours > 0) return `${hours}h ${minutes}m`;
                return `${minutes}m`;

            async function captureFromCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 1280 } } 
                    });
                    
                    return new Promise((resolve) => {
                        const overlay = document.createElement('div');
                        overlay.className = 'crop-modal-overlay';
                        overlay.style.background = 'rgba(0,0,0,0.9)';
                        overlay.innerHTML = `
                            <div class="crop-card" style="background:#111; color:white; text-align:center;">
                                <h3 style="color:#06c6d4; margin-bottom:1rem;">📸 Camera preview</h3>
                                <video id="cameraPreviewVideo" autoplay playsinline class="camera-preview-video" style="width:100%; max-width:300px; border-radius:24px;"></video>
                                <div style="display:flex; gap:1rem; margin-top:1.5rem; justify-content:center;">
                                    <button class="modal-btn secondary" id="cancelCamera">Cancel</button>
                                    <button class="modal-btn" id="captureCamera">Capture</button>
                                </div>
                            </div>
                        `;
                        document.body.appendChild(overlay);
                        
                        const video = document.getElementById('cameraPreviewVideo');
                        video.srcObject = stream;
                        video.play();
                        
                        document.getElementById('cancelCamera').addEventListener('click', () => {
                            stream.getTracks().forEach(track => track.stop());
                            overlay.remove();
                            resolve(null);
                        });
                        
                        document.getElementById('captureCamera').addEventListener('click', () => {

                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            stream.getTracks().forEach(track => track.stop());
                            overlay.remove();
                            resolve(canvas.toDataURL('image/jpeg', 0.95));
                        });
                    });

                        <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                            <button class="modal-btn secondary" id="cancelCrop">Cancel</button>
                            <button class="modal-btn" id="confirmCrop">Crop & Save</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);

                const img = document.getElementById('cropImage');
                img.onload = () => {
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(img, {
                        aspectRatio: 1,
                        viewMode: 1,
                        dragMode: 'move',
                        autoCropArea: 1,
                        cropBoxResizable: true,
                        cropBoxMovable: true,
                    });
                };

                document.getElementById('confirmCrop').addEventListener('click', () => {
                    if (cropper) {
                        const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
                        const croppedDataUrl = canvas.toDataURL('image/jpeg', 0.95);
                        overlay.remove();
                        cropper.destroy();
                        cropper = null;
                        callback(croppedDataUrl);
                    } else {
                        overlay.remove();
                        callback(null);
                    }
                });

                document.getElementById('cancelCrop').addEventListener('click', () => {
                    if (cropper) {
                        cropper.destroy();
                        cropper = null;
                    }
                    overlay.remove();
                    callback(null);
                });
            }

            function fileToBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                });
            }

            // ==================== WALLPAPER ====================
            function applyWallpaper(el) {
                let container = el.querySelector('.wallpaper-container');
                if (!container) {
                    container = document.createElement('div');
                    container.className = 'wallpaper-container';
                    const img = document.createElement('img');
                    img.className = 'wallpaper-image';
                    img.src = wallpaperImage;
                    img.style.opacity = wallpaperOpacity;
                    container.appendChild(img);
                    el.prepend(container);
                } else {
                    const img = container.querySelector('.wallpaper-image');
                    if (img) {
                        img.src = wallpaperImage;
                        img.style.opacity = wallpaperOpacity;
                    }
                }
            }

                overlay.className = 'modal-overlay';

                html += extraContent;
                html += `<div class="modal-actions">`;
                if (showDelete) html += `<button class="modal-btn danger" id="modalDelete">${__('deleteUser')}</button>`;
                html += `<button class="modal-btn secondary" id="modalCancel">${__('cancel')}</button>
                         <button class="modal-btn" id="modalConfirm">${__('save')}</button>
                         </div></div>`;
                
                overlay.innerHTML = html;
                document.body.appendChild(overlay);

                if (withImage) {
                    const fileInput = document.getElementById('modalFileInput');

                    const cameraBtn = document.getElementById('modalCameraBtn');
                    
                    document.getElementById('modalUploadBtn').addEventListener('click', () => fileInput.click());
                    
                    if (cameraBtn) {

                            const b64 = await captureFromCamera();
                            if (b64) {

                                        preview.style.display = 'block';

                if (showDelete && onDelete) {

            // ==================== PRODUCT KEY MODAL ====================
            function showProductKeyModal(isLocked = false) {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                const cancelBtn = isLocked ? '' : `<button class="modal-btn secondary" id="cancelKey">Cancel</button>`;
                const heading = isLocked ? '⏱️ Trial Expired' : '🔑 Enter License Key';
                const desc = isLocked ? 'Your trial has expired. Enter a product key to continue.' : 'Enter product key for 30-day access';
                
                overlay.innerHTML = `
                    <div class="modal-card">
                        <h3 style="font-size:1.4rem; margin-bottom:0.5rem;">${heading}</h3>
                        <p style="margin-bottom:1.5rem; color:#64748b;">${desc}</p>
                        <div class="modal-field">
                            <input type="text" id="productKeyInput" placeholder="Product key" value="" autofocus>
                        </div>
                        <div class="modal-actions">
                            ${cancelBtn}
                            <button class="modal-btn" id="submitKey" onclick="handleActivateKey()">Activate</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);
                setTimeout(() => { const input = document.getElementById('productKeyInput'); if (input) input.focus(); }, 50);
                const handleActivate = () => {
                    const inp = document.getElementById('productKeyInput');
                    const key = inp ? inp.value.trim().toUpperCase().replace(/\s/g, '') : '';
                    if (key && VALID_PRODUCT_KEYS.includes(key)) {
                        saveLicense({ type: 'full', start: Date.now(), duration: MONTH_DURATION });
                        trialExpiredNotified = false;
                        overlay.remove();
                        showToast('✅ License activated for 30 days!', 'success');
                        setTimeout(() => { renderPhoneApp();startLicenseMonitoring(); }, 100);
                    } else if (key) {
                        showToast('❌ Invalid key: ' + key, 'error');
                        if (inp) { inp.value = ''; inp.focus(); }
                    } else {
                        showToast('❌ Please enter a product key', 'error');
                        if (inp) inp.focus();
                    }
                };
                window.handleActivateKey = handleActivate;
                setTimeout(() => {
                    if (!isLocked) {
                        const cancel = document.getElementById('cancelKey');
                        if (cancel) cancel.addEventListener('click', () => overlay.remove());
                    }
                }, 50);
                if (isLocked) {
                    overlay.addEventListener('click', (e) => { if (e.target === overlay) { e.preventDefault(); e.stopPropagation(); } });
                }
            }

            function startLicenseMonitoring() {
                if (licenseCheckInterval) clearInterval(licenseCheckInterval);
                
                licenseCheckInterval = setInterval(() => {
                    const remaining = getRemainingMs();
                    
                    if (remaining <= 10000 && remaining > 0 && !trialExpiredNotified) {
                        trialExpiredNotified = true;
                        showToast('⚠️ Trial expiring in 10 seconds. Product key required!', 'error');
                    }
                    
                    if (isLicenseExpired() && getLicense()?.type === 'trial') {
                        clearInterval(licenseCheckInterval);
                        showToast('⏱️ Trial expired! Enter product key to continue.', 'error');
                        showProductKeyModal(true);
                    }
                }, 1000);
            }

            // ==================== PDF GENERATORS ====================
            function generateSalesPDF() {
                const { jsPDF } = window.jspdf;
                let filteredSales = [...sales].sort((a, b) => new Date(b.date) - new Date(a.date));
                
                // Apply filter based on currentSalesFilter
                if (currentSalesFilter !== 'all') {
                    const now = new Date();
                    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    const weekAgo = new Date(today);
                    weekAgo.setDate(weekAgo.getDate() - 7);
                    const monthAgo = new Date(today);
                    monthAgo.setMonth(monthAgo.getMonth() - 1);
                    
                    if (currentSalesFilter === 'today') {
                        filteredSales = filteredSales.filter(s => new Date(s.date) >= today);
                    } else if (currentSalesFilter === 'week') {
                        filteredSales = filteredSales.filter(s => new Date(s.date) >= weekAgo);
                    } else if (currentSalesFilter === 'month') {
                        filteredSales = filteredSales.filter(s => new Date(s.date) >= monthAgo);
                    }
                }
                
                // Get filter label for filename and title
                let filterLabel = '';
                if (currentSalesFilter === 'today') filterLabel = ' - Today';
                else if (currentSalesFilter === 'week') filterLabel = ' - This Week';
                else if (currentSalesFilter === 'month') filterLabel = ' - This Month';
                
                const totalAmount = filteredSales.reduce((sum, s) => sum + s.finalTotal, 0);
                
                const doc = new jsPDF();
                doc.text("Sales Report - Profit Point" + filterLabel, 14, 20);
                doc.setFontSize(10);
                doc.text(`Total Sales (${filteredSales.length}): TSh ${totalAmount.toLocaleString()}`, 14, 28);
                doc.setFontSize(12);
                
                doc.autoTable({ 
                    head: [['Date', 'Items', 'Total', 'Payment']],
                    body: filteredSales.map(s => [
                        new Date(s.date).toLocaleString(), 
                        s.items.map(i=>i.name).join(', ').substring(0,30), 
                        'TSh '+s.finalTotal,
                        s.payment
                    ]),
                    startY: 38
                });
                doc.save('sales' + (filterLabel ? filterLabel.split(' - ')[1].toLowerCase() : '') + '.pdf');
                showToast('Sales PDF saved');
            }
            function generateAnalyticsPDF() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.text("Analytics - Profit Point", 14, 20);
                let totalRevenue = sales.reduce((a,s)=>a+s.finalTotal,0);
                let totalCost = 0;
                sales.forEach(s => s.items.forEach(itm => {
                    let p = products.find(p=>p.id===itm.productId);
                    if(p) totalCost += p.buyPrice * itm.qty;
                }));
                let totalExpenses = expenses.reduce((a,e)=>a+e.amount,0);
                let netProfit = totalRevenue - totalCost - totalExpenses;
                doc.text(`Revenue: TSh ${totalRevenue}`, 14, 30);
                doc.text(`Expenses: TSh ${totalExpenses}`, 14, 38);
                doc.text(`Net profit: TSh ${netProfit}`, 14, 46);
                doc.save('analytics.pdf');
                showToast('Analytics PDF saved');
            }

                    let saleItems = cart.map(i => ({
                        productId: i.productId,
                        name: i.name,
                        qty: i.qty,
                        price: i.price

                    saleItems.forEach(si => {

                        }
                    });
                });
                
                // Filter functionality
                const expFilterMode_var = expenseFilterMode; // local reference
                document.querySelectorAll('[data-expense-filter]').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        e.preventDefault();
                        document.querySelectorAll('[data-expense-filter]').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        expenseFilterMode = tab.getAttribute('data-expense-filter');
                        renderExpensesList();
                    });
                });
                
                // Search functionality
                document.getElementById('expenseSearchInput')?.addEventListener('input', (e) => {
                    expenseSearchTerm = e.target.value;
                    renderExpensesList();
                });
                
                // Clear all expenses
                document.getElementById('clearExpensesBtn')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (confirm('Are you sure you want to clear all expenses?')) {
                        expenses = [];
                        saveExpenses();
                        renderAnalysisMobile();
                        showToast(__('clearExpenses') + ' completed');
                    }
                });
                
                // PDF Export (respects current filter)
                document.getElementById('pdfExpensesBtn')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    
                    // Apply same filtering logic as renderExpensesList
                    const now = new Date();
                    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    const weekAgo = new Date(today);
                    weekAgo.setDate(weekAgo.getDate() - 7);
                    const monthAgo = new Date(today);
                    monthAgo.setMonth(monthAgo.getMonth() - 1);
                    
                    let filteredExpenses = expenses.filter(e => {
                        const expDate = new Date(e.date);
                        let passDateFilter = true;
                        
                        if (expenseFilterMode === 'today') passDateFilter = expDate >= today;
                        else if (expenseFilterMode === 'week') passDateFilter = expDate >= weekAgo;
                        else if (expenseFilterMode === 'month') passDateFilter = expDate >= monthAgo;
                        
                        const passSearch = !expenseSearchTerm || 
                            e.desc?.toLowerCase().includes(expenseSearchTerm.toLowerCase()) ||
                            (e.category && e.category.toLowerCase().includes(expenseSearchTerm.toLowerCase()));
                        
                        return passDateFilter && passSearch;
                    }).sort((a, b) => new Date(b.date) - new Date(a.date));
                    
                    if (filteredExpenses.length === 0) {
                        showToast('No expenses to export in this filter', 'error');
                        return;
                    }
                    
                    const totalExp = filteredExpenses.reduce((a, e) => a + (e.amount || 0), 0);
                    const avgExp = filteredExpenses.length > 0 ? Math.round(totalExp / filteredExpenses.length) : 0;
                    
                    // Get filter label
                    const filterLabels = {
                        'all': 'All Expenses',
                        'today': 'Today\'s Expenses',
                        'week': 'This Week\'s Expenses',
                        'month': 'This Month\'s Expenses'
                    };
                    const filterLabel = filterLabels[expenseFilterMode] || 'Expense Report';
                    
                    doc.setFontSize(16);
                    doc.text(filterLabel, 14, 15);
                    doc.setFontSize(10);
                    doc.text(`Generated: ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}`, 14, 23);
                    if (expenseSearchTerm) {
                        doc.text(`Search: ${expenseSearchTerm}`, 14, 29);
                    }
                    
                    const tableData = [['Date', 'Description', 'Category', 'Amount']];
                    
                    filteredExpenses.forEach(e => {
                        const date = new Date(e.date).toLocaleDateString();
                        const cat = expenseCategories.find(c => c.value === e.category)?.label || e.category || 'Other';
                        tableData.push([date, e.desc || '-', cat, `TSh ${e.amount}`]);
                    });
                    
                    doc.autoTable({
                        head: [tableData[0]],
                        body: tableData.slice(1),
                        startY: expenseSearchTerm ? 35 : 30
                    });
                    
                    doc.setFontSize(10);
                    doc.text(`Total Expenses: TSh ${totalExp.toLocaleString()}`, 14, doc.lastAutoTable.finalY + 10);
                    doc.text(`Average Expense: TSh ${avgExp.toLocaleString()}`, 14, doc.lastAutoTable.finalY + 17);
                    doc.text(`Expenses Exported: ${filteredExpenses.length}`, 14, doc.lastAutoTable.finalY + 24);
                    
                    const fileName = `expenses-${expenseFilterMode}-${new Date().toISOString().slice(0, 10)}.pdf`;
                    doc.save(fileName);
                    showToast('Expense report exported');
                });
                
                // Initial render
                renderExpensesList();
            }

                        document.querySelectorAll('.nav-item-mobile').forEach(n => n.classList.remove('active'));
                        item.classList.add('active');
                        currentPage = item.dataset.page;
                        renderMobilePage(currentPage);
                    });
                });
                
                document.querySelector(`.nav-item-mobile[data-page="${currentPage}"]`)?.classList.add('active');
                
                renderMobilePage(currentPage);
            }

            // ==================== RENDER MOBILE PAGE ====================
            function renderMobilePage(page) {
                if (page === 'pos') renderPosMobile();
                else if (page === 'products') renderProductsMobile();
                else if (page === 'analysis') renderAnalysisMobile();
                else if (page === 'sales') renderSalesMobile();
                else if (page === 'alerts') renderAlertsMobile();
                else if (page === 'users' && isManager()) renderUsersMobile();
            }

            // ==================== START APP ====================
            setTimeout(() => {
                splash.style.display = 'none';
                
                if (!getLicense()) {
                    saveLicense({ type: 'trial', start: Date.now(), duration: TRIAL_DURATION });
                }
                
                if (isLicenseExpired() && getLicense()?.type === 'trial') {
                    showProductKeyModal(true);
                    startLicenseMonitoring();
                } else if (!currentUser) {
                    showAuthScreen();
                    startLicenseMonitoring();
                } else {
                    renderPhoneApp();
                    startLicenseMonitoring();
                }
            }, 1200);
        })();
    </script>
</body>
</html>
