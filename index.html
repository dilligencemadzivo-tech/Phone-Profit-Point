<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profit Point · premium POS</title>
    <!-- Font Awesome 6 + Google Fonts Inter + Chart.js 4 + Cropper.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f2b44; /* match dark bg */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh; /* dynamic viewport */
        }
        #phoneApp {
            width: 100%;
            max-width: 420px;
            height: 100vh; /* fallback */
            height: 100dvh; /* dynamic */
            background: #ffffff;
            box-shadow: 0 20px 50px rgba(0, 40, 70, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden; /* no scroll on container */
            border-radius: 0; /* fullscreen feel */
        }
        /* wallpaper container - high quality image with sharp rendering */
        .wallpaper-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            background: #0f2b44; /* fallback */
        }
        .wallpaper-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: var(--wallpaper-opacity, 0.25);
            transition: opacity 0.2s ease;
            pointer-events: none;
            image-rendering: -webkit-optimize-contrast; /* improve sharpness */
            image-rendering: crisp-edges; /* fallback */
            transform: translateZ(0); /* hardware acceleration */
            backface-visibility: hidden;
        }
        /* content layers */
        .app-header, .main-content, .bottom-nav, .cart-fab, .cart-modal-overlay, .modal-overlay, .auth-overlay,
        .auth-card-modern, button, input, select, .nav-item-mobile, .chip, .product-tile-mobile {
            position: relative;
            z-index: 2;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1rem 0.8rem;
            background: rgba(245, 250, 255, 0.7);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            scrollbar-width: thin;
            /* ensure it fills space but bottom nav stays fixed */
        }
        /* fixed bottom nav - does NOT scroll */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 0.5rem 0.2rem;
            border-top: 1px solid #ffffff80;
            box-shadow: 0 -8px 25px rgba(0,40,70,0.15);
            border-radius: 28px 28px 0 0;
            flex-shrink: 0; /* prevent shrinking */
            z-index: 10;
        }
        .nav-item-mobile {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.7rem;
            color: #2e4b6e;
            padding: 8px 0;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .nav-item-mobile i { font-size: 1.5rem; margin-bottom: 2px; }
        .nav-item-mobile.active { background: #1b4f72; color: white; box-shadow: 0 6px 14px #1b4f7240; }
        .nav-item-mobile:active { transform: scale(0.94); background: rgba(27,79,114,0.2); }

        /* cart fab stays above content, not scrollable */
        .cart-fab {
            position: sticky;
            bottom: 0.8rem;
            z-index: 100;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }
        .cart-btn {
            background: linear-gradient(145deg, #1b4f72, #0b6b96);
            color: white;
            border: none;
            border-radius: 80px;
            padding: 1rem 2.2rem;
            font-size: 1.3rem;
            font-weight: 700;
            box-shadow: 0 15px 25px #1b4f7290;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            border: 1px solid #ffffff50;
            transition: all 0.2s ease;
            pointer-events: auto;
        }
        .cart-btn:active { transform: scale(0.94); }
        .cart-badge { background: #fedb9f; color: #0f2b44; border-radius: 60px; padding: 0.2rem 1rem; font-size: 1.1rem; }

        /* modal overlays */
        .cart-modal-overlay, .modal-overlay, .auth-overlay, .crop-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300000;
            padding: 1.5rem;
            animation: fadeScale 0.3s ease;
        }
        .crop-modal-overlay { z-index: 400000; background: rgba(0,0,0,0.8); }
        .cart-modal-card, .modal-card, .crop-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 40px 70px rgba(0, 30, 50, 0.6);
            border: 1px solid rgba(255,255,240,0.7);
            max-height: 85vh;
            overflow-y: auto;
        }
        .crop-card { max-width: 400px; text-align: center; }
        .crop-container { width: 100%; max-height: 50vh; margin: 1rem 0; }
        #cropImage { max-width: 100%; max-height: 50vh; }

        /* auth modern (fuller) */
        .auth-overlay { background: rgba(0,0,0,0.3); backdrop-filter: blur(12px); }
        .auth-card-modern {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(30px);
            border-radius: 56px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 40px 70px rgba(0,10,20,0.4);
            border: 1px solid rgba(255,255,255,0.7);
            animation: slideSoft 0.5s;
        }
        .auth-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem; }
        .auth-logo-icon { background: #0f2b44; color: #fedb9f; width: 80px; height: 80px; border-radius: 40px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; margin-bottom: 1rem; box-shadow: 0 15px 25px rgba(0,0,0,0.2); border: 2px solid rgba(255,215,140,0.7); }
        .auth-header h2 { font-size: 2.2rem; font-weight: 600; color: #0f2b44; letter-spacing: -0.5px; }
        .auth-field { background: rgba(255,255,255,0.6); backdrop-filter: blur(4px); border-radius: 60px; padding: 0.1rem 1.5rem; margin-bottom: 1.2rem; border: 1px solid rgba(255,255,255,0.9); transition: 0.2s; box-shadow: 0 8px 16px rgba(0,20,40,0.1); }
        .auth-field input, .auth-field select { width: 100%; border: none; background: transparent; padding: 1rem 0; font-size: 1rem; outline: none; color: #0f2b44; }
        .auth-btn { background: #0f2b44; color: white; border: none; border-radius: 60px; padding: 1.1rem; width: 100%; font-weight: 600; font-size: 1.2rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 15px 25px rgba(10,30,50,0.3); display: flex; align-items: center; justify-content: center; gap: 10px; margin: 1.5rem 0 1rem; border: 1px solid rgba(255,255,255,0.2); }
        .auth-btn:active { transform: scale(0.96); }
        .auth-switch { text-align: center; color: #0f2b44; cursor: pointer; font-weight: 500; font-size: 0.95rem; padding: 0.5rem; opacity: 0.9; transition: 0.2s; }
        .auth-switch:hover { opacity: 1; text-decoration: underline; }

        /* other styles remain, compacted for brevity but functional */
        .product-grid-mobile { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; margin: 1rem 0; }
        .product-tile-mobile { background: rgba(255,255,255,0.95); border-radius: 28px; padding: 1rem 0.3rem; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 1px solid #dbeafe; cursor: pointer; transition: all 0.15s; }
        .product-tile-mobile:active { transform: scale(0.94); background: #f0f7ff; }
        .product-image-mobile { width: 70px; height: 70px; border-radius: 24px; background: #f0f7ff; margin: 0 auto 0.5rem; border: 2px solid #fedb9f; overflow: hidden; }
        .product-image-mobile img { width: 100%; height: 100%; object-fit: cover; }
        .product-price-mobile { font-weight: 800; color: #0f2b44; font-size: 1.2rem; }
        .chip { background: #ecf5ff; border-radius: 40px; padding: 0.6rem 1.2rem; cursor: pointer; font-weight: 500; border: 1px solid #c2daf5; display: inline-block; transition: all 0.2s; }
        .chip:active { transform: scale(0.94); }
        .chip.active { background: #1b4f72; color: white; }
        .payment-option { background: white; border-radius: 40px; padding: 0.7rem 1.2rem; border:1px solid #c2daf5; cursor:pointer; display: inline-block; transition: all 0.2s; }
        .payment-option.active { background: #1b4f72; color: white; }
        .btn-small { background: #1b4f72; color: white; border:none; border-radius:60px; padding:0.7rem 1.4rem; font-weight:600; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
        .btn-small:active { transform: scale(0.94); }
        .stats-grid, .filter-tabs, .sale-item, .user-row { /* reused from previous */ }
        /* toast etc */
        #toastContainer { position: fixed; bottom: 90px; left: 16px; right: 16px; max-width: 400px; margin: 0 auto; z-index: 999999; }
        .toast { background: #1e3b5c; color: white; padding: 14px 22px; border-radius: 60px; font-weight: 500; box-shadow: 0 15px 30px rgba(0,20,40,0.3); border-left: 6px solid #fedb9f; backdrop-filter: blur(12px); display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease; margin-bottom: 8px; }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .trial-badge { background: #fee9b0; color: #7a4f0e; border-radius: 40px; padding: 0.3rem 1.2rem; font-size: 0.8rem; font-weight: 600; }
        .wallpaper-control { display: flex; align-items: center; gap: 12px; margin: 1rem 0; background: rgba(255,255,255,0.5); border-radius: 60px; padding: 0.8rem 1.2rem; border: 1px solid #d4e2f0; }
        .wallpaper-upload { background: #eaf1fb; border: 2px dashed #1b4f72; border-radius: 60px; padding: 0.8rem 1.2rem; text-align: center; color: #1b4f72; font-weight: 600; cursor: pointer; margin: 1rem 0; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .wallpaper-upload:active { transform: scale(0.96); }
        .camera-btn, .upload-btn { background: #d4e6ff; border: 2px solid #1b4f72; border-radius: 60px; padding: 0.6rem 1rem; cursor: pointer; font-weight: 500; margin-bottom: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 8px; color: #0f2b44; transition: all 0.2s; }
        .camera-btn:active, .upload-btn:active { transform: scale(0.96); }
        .image-preview { width: 70px; height: 70px; border-radius: 20px; object-fit: cover; border: 2px solid #fedb9f; margin: 0 auto 1rem; display: none; background: #f0f5fd; }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }
    </style>
</head>
<body>
    <div id="phoneApp"></div>
    <div id="toastContainer"></div>
    
    <!-- splash loading screen -->
    <div id="splashLoading" class="splash-loading" style="position:fixed; inset:0; background:linear-gradient(145deg,#0f2b44,#1b5a82); display:flex; align-items:center; justify-content:center; z-index:1000000; flex-direction:column;">
        <div class="splash-spinner" style="width:90px; height:90px; border:6px solid rgba(255,255,255,0.15); border-top:6px solid #fedb9f; border-radius:50%; animation:spin 1.2s infinite;"></div>
        <div class="splash-text" style="margin-top:2rem; color:white; font-size:2rem; font-weight:700;">Profit Point</div>
    </div>
    <style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>

<script>
(function() {
    const toastContainer = document.getElementById('toastContainer');
    const splash = document.getElementById('splashLoading');

    // ========== LICENSING ==========
    const LICENSE_KEY = 'profitpoint_license';
    const TRIAL_DURATION = 60 * 1000;
    const MONTH_DURATION = 30 * 24 * 60 * 60 * 1000;
    const PRODUCT_KEY = '12345ABCDE';

    function getLicense() {
        const lic = localStorage.getItem(LICENSE_KEY);
        try { return JSON.parse(lic); } catch { return null; }
    }
    function saveLicense(lic) { localStorage.setItem(LICENSE_KEY, JSON.stringify(lic)); }
    function checkLicenseValid() {
        const lic = getLicense();
        if (!lic) { saveLicense({ type: 'trial', start: Date.now(), duration: TRIAL_DURATION }); return true; }
        if (lic.type === 'trial') return (Date.now() - lic.start) < lic.duration;
        if (lic.type === 'full') return (Date.now() - lic.start) < lic.duration;
        return false;
    }
    function getRemainingMs() {
        const lic = getLicense();
        if (!lic) return 0;
        const remaining = lic.duration - (Date.now() - lic.start);
        return remaining > 0 ? remaining : 0;
    }
    function formatRemaining(ms) {
        if (ms <= 0) return 'Expired';
        const days = Math.floor(ms / (24*3600*1000));
        const hours = Math.floor((ms % (24*3600*1000)) / (3600*1000));
        const minutes = Math.floor((ms % (3600*1000)) / (60*1000));
        if (days > 0) return `${days}d ${hours}h`;
        if (hours > 0) return `${hours}h ${minutes}m`;
        return `${minutes}m`;
    }

    // ========== TOAST ==========
    function showToast(msg, type='success') { 
        const t = document.createElement('div'); 
        t.className = `toast ${type}`; 
        t.innerHTML = `<i class="fas ${type==='error'?'fa-circle-exclamation':'fa-circle-check'}"></i> ${msg}`; 
        toastContainer.appendChild(t); 
        setTimeout(() => t.remove(), 4000); 
    }

    // ========== TRANSLATIONS ==========
    const translations = {
        en: { pos:"POS", products:"Products", sales:"Sales", alerts:"Alerts", users:"Users", search:"search...", all:"All", food:"Food", drinks:"Drinks", staple:"Staple", cart:"Cart", cash:"Cash", complete:"COMPLETE", total:"Total", emptyCart:"cart empty", payment:"Payment", productTitle:"Products", addProduct:"+ product", alertTitle:"Low stock alerts", noAlerts:"no alerts", userTitle:"Users", addUser:"+ user", settings:"Settings", language:"Language", logout:"logout", karibu:"welcome", outOfStock:"out of stock", save:"Save", cancel:"Cancel", newProduct:"New product", productName:"Name", buyPrice:"Buy price", sellPrice:"Sell price", quantity:"Stock", category:"Category", newUser:"New user", fullName:"Full name", username:"Username", password:"Password", role:"Role", teller:"Teller", manager:"Manager", analysis:"Analytics", profit:"Profit", expenses:"Expenses", revenue:"Revenue", shopName:"Shop name", uploadLogo:"Upload logo", addExpense:"Add expense", desc:"Description", amount:"Amount", productImage:"Product image", editProduct:"Edit product", editUser:"Edit user", deleteUser:"Delete user", confirmDelete:"Are you sure?", phoneNumber:"Phone number", signIn:"Sign In", signUp:"Sign Up", camera:"Camera", profileImage:"Profile Picture", welcome:"Welcome", firstName:"First Name", lastName:"Last Name", confirmPassword:"Confirm Password", alreadyHaveAccount:"Already have an account?", needAccount:"Need an account?", wallpaperOpacity:"Opacity", uploadWallpaper:"Upload wallpaper", salesHistory:"Sales History", today:"Today", week:"Week", month:"Month", averageOrder:"Avg. Order", topProduct:"Top Product", transactions:"Transactions", profitMargin:"Profit Margin", license:"License", remaining:"Remaining", enterKey:"Enter key" },
        sw: { pos:"POS", products:"Bidhaa", sales:"Mauzo", alerts:"Tahadhari", users:"Watumiaji", search:"tafuta...", all:"Zote", food:"Chakula", drinks:"Vinywaji", staple:"Msingi", cart:"Kikapu", cash:"Taslimu", complete:"MALIZA", total:"Jumla", emptyCart:"kikapu tupu", payment:"Malipo", productTitle:"Bidhaa", addProduct:"+ bidhaa", alertTitle:"Tahadhari · stock chini", noAlerts:"hakuna alerts", userTitle:"Watumiaji", addUser:"+ mtumiaji", settings:"Mipangilio", language:"Lugha", logout:"toka", karibu:"karibu", outOfStock:"hakuna bidhaa", save:"Hifadhi", cancel:"Ghairi", newProduct:"Bidhaa mpya", productName:"Jina", buyPrice:"Bei ya kununua", sellPrice:"Bei ya kuuza", quantity:"Idadi", category:"Aina", newUser:"Mtumiaji mpya", fullName:"Jina kamili", username:"Jina la mtumiaji", password:"Nywila", role:"Wajibu", teller:"Teller", manager:"Meneja", analysis:"Uchambuzi", profit:"Faida", expenses:"Matumizi", revenue:"Mapato", shopName:"Jina la duka", uploadLogo:"Pakia nembo", addExpense:"Ongeza matumizi", desc:"Maelezo", amount:"Kiasi", productImage:"Picha ya bidhaa", editProduct:"Hariri bidhaa", editUser:"Hariri mtumiaji", deleteUser:"Futa mtumiaji", confirmDelete:"Una uhakika?", phoneNumber:"Namba ya simu", signIn:"Ingia", signUp:"Jisajili", camera:"Kamera", profileImage:"Picha ya Profaili", welcome:"Karibu", firstName:"Jina la Kwanza", lastName:"Jina la Mwisho", confirmPassword:"Thibitisha Nywila", alreadyHaveAccount:"Tayari una akaunti?", needAccount:"Unahitaji akaunti?", wallpaperOpacity:"Mwangaza", uploadWallpaper:"Pakia picha", salesHistory:"Historia ya Mauzo", today:"Leo", week:"Wiki", month:"Mwezi", averageOrder:"Wastani", topProduct:"Bidhaa Bora", transactions:"Miamala", profitMargin:"Faida", license:"Leseni", remaining:"imesalia", enterKey:"Weka ufunguo" }
    };
    let currentLang = localStorage.getItem('profitpoint_lang') || 'sw';
    function __(key) { return translations[currentLang]?.[key] || translations.en[key] || key; }

    // ========== DATA ==========
    const AUTH_KEY = 'profitpoint_auth'; 
    const USERS_KEY = 'profitpoint_users';
    let users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
    if (!users.length) {
        users.push({ id:'u'+Date.now(), username:'manager', password:'man123', role:'manager', name:'Manager', phone:'+255123456789', profileImage:null, createdAt:new Date().toISOString() });
        saveUsers();
    }
    let currentUser = JSON.parse(localStorage.getItem(AUTH_KEY)) || null;

    const STORAGE_PROD = 'profitpoint_products';
    let products = JSON.parse(localStorage.getItem(STORAGE_PROD)) || [];
    if (!products.length) {
        products = [
            { id:'p1', name:'Chips Mayai', category:'Food', buyPrice:1000, sellPrice:2500, stock:45, minStock:10, image:'https://images.unsplash.com/photo-1630384060421-cb20d0e0649d?w=600' },
            { id:'p2', name:'Coca-Cola', category:'Drinks', buyPrice:800, sellPrice:1500, stock:82, minStock:15, image:'https://images.unsplash.com/photo-1629203851122-3726ecdf080e?w=600' },
            { id:'p3', name:'Sambusa', category:'Food', buyPrice:1200, sellPrice:2000, stock:33, minStock:8, image:'https://images.unsplash.com/photo-1601050690597-df0568f70950?w=600' }
        ];
        saveProducts();
    }
    let sales = JSON.parse(localStorage.getItem('profitpoint_sales')) || [];
    let expenses = JSON.parse(localStorage.getItem('profitpoint_expenses')) || [];
    let customers = JSON.parse(localStorage.getItem('profitpoint_customers')) || [{ id:'c1', name:'Walk-in', phone:'' }];
    let shopBrand = JSON.parse(localStorage.getItem('profitpoint_brand')) || { name: 'Profit Point', logo: '💎' };
    let cart = JSON.parse(localStorage.getItem('profitpoint_cart')) || [];
    let selectedPayment = 'Cash';
    let selectedCustomer = customers[0]?.id || 'c1';
    
    // wallpaper with improved quality (higher resolution image)
    let wallpaperOpacity = parseFloat(localStorage.getItem('profitpoint_wallpaper_opacity')) || 0.25;
    let wallpaperImage = localStorage.getItem('profitpoint_wallpaper') || 'https://images.unsplash.com/photo-1584132967334-10e028c69f1c?w=1200'; // higher res

    function saveProducts() { localStorage.setItem(STORAGE_PROD, JSON.stringify(products)); }
    function saveSales() { localStorage.setItem('profitpoint_sales', JSON.stringify(sales)); }
    function saveExpenses() { localStorage.setItem('profitpoint_expenses', JSON.stringify(expenses)); }
    function saveCustomers() { localStorage.setItem('profitpoint_customers', JSON.stringify(customers)); }
    function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
    function saveBrand() { localStorage.setItem('profitpoint_brand', JSON.stringify(shopBrand)); }
    function saveCart() { localStorage.setItem('profitpoint_cart', JSON.stringify(cart)); }
    function saveWallpaper() { localStorage.setItem('profitpoint_wallpaper', wallpaperImage); }
    function saveWallpaperOpacity(v) { localStorage.setItem('profitpoint_wallpaper_opacity', v); }

    let currentPage = 'pos'; 
    const isManager = () => currentUser?.role === 'manager';

    // ========== CROPPER + CAMERA ==========
    let cropper = null;
    function showCropModal(imageSrc, callback) {
        const overlay = document.createElement('div');
        overlay.className = 'crop-modal-overlay';
        overlay.innerHTML = `
            <div class="crop-card">
                <h3 style="margin-bottom:1rem;">Crop Image</h3>
                <div class="crop-container">
                    <img id="cropImage" src="${imageSrc}" style="max-width:100%;">
                </div>
                <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                    <button class="modal-btn secondary" id="cancelCrop">Cancel</button>
                    <button class="modal-btn" id="confirmCrop">Crop & Save</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);

        const img = document.getElementById('cropImage');
        img.onload = () => {
            if (cropper) cropper.destroy();
            cropper = new Cropper(img, {
                aspectRatio: 1,
                viewMode: 1,
                dragMode: 'move',
                autoCropArea: 1,
                cropBoxResizable: true,
                cropBoxMovable: true,
            });
        };

        document.getElementById('confirmCrop').addEventListener('click', () => {
            if (cropper) {
                const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
                const croppedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
                overlay.remove();
                cropper.destroy(); cropper = null;
                callback(croppedDataUrl);
            } else { overlay.remove(); callback(null); }
        });
        document.getElementById('cancelCrop').addEventListener('click', () => {
            if (cropper) { cropper.destroy(); cropper = null; }
            overlay.remove(); callback(null);
        });
    }

    async function captureFromCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); // better quality
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    resolve();
                };
            });
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            stream.getTracks().forEach(track => track.stop());
            return canvas.toDataURL('image/jpeg', 0.95);
        } catch (error) {
            showToast('Camera access denied', 'error');
            return null;
        }
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
        });
    }

                    <div class="auth-switch" id="switchToSignUp">${__('needAccount')} ${__('signUp')}</div>
                </div>`;
            attachAuthEvents();
        };
        const attachAuthEvents = () => {
            if (isSignUp) {
                document.getElementById('signupBtn')?.addEventListener('click', async (e) => {
                    e.preventDefault();
                    const fn = document.getElementById('signupFirstName').value;
                    const ln = document.getElementById('signupLastName').value;
                    const un = document.getElementById('signupUsername').value;
                    const pw = document.getElementById('signupPassword').value;
                    const cp = document.getElementById('signupConfirmPassword').value;
                    const ph = document.getElementById('signupPhone').value;
                    const rl = document.getElementById('signupRole').value;
                    if (!fn || !ln || !un || !pw || !ph) return showToast('All fields required','error');
                    if (pw !== cp) return showToast('Passwords mismatch','error');
                    if (users.some(u=>u.username===un)) return showToast('Username exists','error');
                    const newUser = { id:'u'+Date.now(), username:un, password:pw, role:rl, name:`${fn} ${ln}`, phone:ph, profileImage:null, createdAt:new Date().toISOString() };
                    users.push(newUser); saveUsers(); currentUser = newUser; localStorage.setItem(AUTH_KEY, JSON.stringify(newUser));
                    document.getElementById('authOverlay')?.remove(); renderPhoneApp(); showToast(`${__('welcome')} ${newUser.name}`);
                });

                document.getElementById('loginBtn')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    const un = document.getElementById('loginUsername').value;
                    const pw = document.getElementById('loginPassword').value;

            document.getElementById('switchToSignIn')?.addEventListener('click', ()=>{ isSignUp=false; renderAuth(); });
        };
        renderAuth();
    }

    function applyWallpaper(el) {
        let container = el.querySelector('.wallpaper-container');
        if (!container) {
            container = document.createElement('div'); container.className = 'wallpaper-container';
            const img = document.createElement('img'); img.className = 'wallpaper-image'; img.src = wallpaperImage; img.style.opacity = wallpaperOpacity;
            container.appendChild(img); el.prepend(container);
        } else {
            const img = container.querySelector('.wallpaper-image'); if (img) { img.src = wallpaperImage; img.style.opacity = wallpaperOpacity; }
        }
    }

    // ========== MODAL WITH CROP ==========
    function showEnhancedModal(options) {
        const { title, fields, onConfirm, withImage = false, imageLabel = 'Upload', showDelete = false, onDelete, extraContent = '', onExtraInit } = options;
        const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
        let imageData = null;
        let html = `<div class="modal-card"><h3><i class="fas fa-pen-alt"></i> ${title}</h3>`;
        if (withImage) {
            html += `<div class="image-preview" id="modalImagePreview"></div>
                     <div class="upload-btn" id="modalUploadBtn"><i class="fas fa-cloud-upload-alt"></i> ${imageLabel}</div>
                     <div class="camera-btn" id="modalCameraBtn"><i class="fas fa-camera"></i> ${__('camera')}</div>
                     <input type="file" id="modalFileInput" accept="image/*" style="display:none;">`;
        }
        fields.forEach(f => {
            if (f.type === 'select') {
                html += `<div class="modal-field"><select id="modal-${f.name}">${f.options.map(opt => `<option value="${opt.value}" ${f.value===opt.value?'selected':''}>${opt.label}</option>`).join('')}</select></div>`;
            } else {
                html += `<div class="modal-field"><input type="${f.type||'text'}" id="modal-${f.name}" placeholder="${f.placeholder}" value="${f.value||''}"></div>`;
            }
        });
        html += extraContent;
        html += `<div class="modal-actions">`;
        if (showDelete) html += `<button class="modal-btn danger" id="modalDelete">${__('deleteUser')}</button>`;
        html += `<button class="modal-btn secondary" id="modalCancel">${__('cancel')}</button><button class="modal-btn" id="modalConfirm">${__('save')}</button></div></div>`;
        overlay.innerHTML = html; document.body.appendChild(overlay);

        if (withImage) {
            const fileInput = document.getElementById('modalFileInput');
            const preview = document.getElementById('modalImagePreview');
            const cameraBtn = document.getElementById('modalCameraBtn');
            document.getElementById('modalUploadBtn').addEventListener('click', () => fileInput.click());
            if (cameraBtn) {
                cameraBtn.addEventListener('click', async () => {
                    const b64 = await captureFromCamera();
                    if (b64) showCropModal(b64, (cropped) => { if (cropped) { imageData = cropped; preview.style.display = 'block'; preview.innerHTML = `<img src="${cropped}">`; } });
                });
            }
            fileInput.addEventListener('change', async (e) => {
                if (e.target.files[0]) {
                    const b64 = await fileToBase64(e.target.files[0]);
                    showCropModal(b64, (cropped) => { if (cropped) { imageData = cropped; preview.style.display = 'block'; preview.innerHTML = `<img src="${cropped}">`; } });
                }
            });
        }

        document.getElementById('modalCancel').addEventListener('click', () => overlay.remove());
        if (showDelete && onDelete) document.getElementById('modalDelete')?.addEventListener('click', (e) => { e.preventDefault(); if (confirm(__('confirmDelete'))) { overlay.remove(); onDelete(); } });
        document.getElementById('modalConfirm').addEventListener('click', (e) => {
            e.preventDefault();
            const data = {};
            fields.forEach(f => { const el = document.getElementById(`modal-${f.name}`); if (el) data[f.name] = el.value; });
            if (withImage) data.image = imageData || '';
            overlay.remove(); onConfirm(data);
        });
        if (onExtraInit) setTimeout(onExtraInit, 100);
    }

    // cart modal (simplified)
    function showCartModal() {
        const overlay = document.createElement('div'); overlay.className = 'cart-modal-overlay';
        let total = cart.reduce((s,i)=>s+i.price*i.qty,0);
        overlay.innerHTML = `
            <div class="cart-modal-card"><h3><i class="fas fa-shopping-cart"></i> ${__('cart')}</h3>
                <div>${cart.length?cart.map((i,idx)=>`<div style="display:flex; justify-content:space-between; padding:8px 0;"><span><strong>${i.name}</strong> x${i.qty}</span><span>TSh ${i.price*i.qty} <i class="fas fa-trash" style="color:#c0392b; cursor:pointer;" data-idx="${idx}"></i></span></div>`).join(''):`<p style="text-align:center;">${__('emptyCart')}</p>`}</div>
                <div style="margin:1rem 0;"><select id="modalCustomerSelect" style="width:100%; padding:0.8rem; border-radius:60px;">${customers.map(c=>`<option value="${c.id}" ${c.id===selectedCustomer?'selected':''}>${c.name}</option>`).join('')}</select></div>
                <div style="display:flex; gap:0.5rem; margin:0.5rem 0;">${['Cash','Card','Mobile'].map(p=>`<span class="payment-option ${selectedPayment===p?'active':''}" data-pay="${p}">${p==='Cash'?__('cash'):p}</span>`).join('')}</div>
                <div style="font-size:1.8rem; font-weight:700;">${__('total')}: TSh ${total}</div>
                <div style="display:flex; gap:1rem; margin-top:1.5rem;"><button class="modal-btn secondary" id="closeCartModal">${__('cancel')}</button><button class="modal-btn" id="modalCompleteSale">${__('complete')}</button></div>
            </div>`;
        document.body.appendChild(overlay);
        overlay.querySelectorAll('.payment-option').forEach(el=>el.addEventListener('click',(e)=>{ e.preventDefault(); selectedPayment=el.dataset.pay; overlay.querySelectorAll('.payment-option').forEach(o=>o.classList.remove('active')); el.classList.add('active'); }));
        overlay.querySelector('#closeCartModal').addEventListener('click',()=>overlay.remove());
        overlay.querySelector('#modalCompleteSale').addEventListener('click',()=>{
            if(!cart.length) return showToast(__('emptyCart'),'error');
            let final=cart.reduce((s,i)=>s+i.price*i.qty,0);
            let items=cart.map(i=>({productId:i.productId,name:i.name,qty:i.qty,price:i.price}));
            items.forEach(si=>{ let p=products.find(p=>p.id===si.productId); if(p) p.stock-=si.qty; }); saveProducts();
            sales.push({ id:Date.now(), items, finalTotal:final, payment:selectedPayment, customerId:selectedCustomer, date:new Date().toISOString() }); saveSales();
            cart=[]; saveCart(); overlay.remove(); showToast('Sale completed'); renderPosMobile();
        });
        overlay.querySelectorAll('.fa-trash').forEach(icon=>icon.addEventListener('click',(e)=>{ e.stopPropagation(); let idx=icon.dataset.idx; if(idx!==undefined){ cart.splice(idx,1); saveCart(); overlay.remove(); showCartModal(); } }));
        document.getElementById('modalCustomerSelect').addEventListener('change',(e)=>selectedCustomer=e.target.value);
    }

    function renderProductsMobile() { if(!isManager()) return; let h='<div style="background:white; border-radius:40px; padding:1.4rem;"><h3><i class="fas fa-cubes"></i> '+__('productTitle')+'</h3>'; products.forEach(p=>{h+=`<div style="display:flex; align-items:center; gap:0.5rem; padding:12px 0; border-bottom:1px solid #e2edff;"><span>${p.image?`<img src="${p.image}" style="width:30px; height:30px; border-radius:12px;">`:'📦'}</span><span style="flex:1;">${p.name}</span><span>B ${p.buyPrice}/S ${p.sellPrice}</span><i class="fas fa-edit" data-id="${p.id}" style="color:#1b4f72; cursor:pointer;"></i></div>`;}); h+=`<button class="btn-small" id="addProdBtn" style="width:100%; margin-top:1rem;">${__('addProduct')}</button></div>`; document.getElementById('mobileContent').innerHTML=h;
        document.getElementById('addProdBtn').addEventListener('click',()=>showEnhancedModal({title:__('newProduct'),withImage:true,imageLabel:__('productImage'),fields:[{name:'name',placeholder:__('productName')},{name:'buyPrice',placeholder:__('buyPrice'),type:'number'},{name:'sellPrice',placeholder:__('sellPrice'),type:'number'},{name:'stock',placeholder:__('quantity'),type:'number',value:0},{name:'category',placeholder:__('category'),value:'General'}],onConfirm:(d)=>{ products.push({id:'p'+Date.now(),name:d.name,category:d.category,buyPrice:parseFloat(d.buyPrice)||0,sellPrice:parseFloat(d.sellPrice)||0,stock:parseInt(d.stock)||0,minStock:5,image:d.image||null}); saveProducts(); renderProductsMobile(); showToast('Product added');}}));
        document.querySelectorAll('.fa-edit').forEach(ic=>ic.addEventListener('click',()=>{ let pid=ic.dataset.id,p=products.find(p=>p.id===pid); if(!p)return; showEnhancedModal({title:__('editProduct'),withImage:true,imageLabel:__('productImage'),fields:[{name:'name',value:p.name},{name:'buyPrice',type:'number',value:p.buyPrice},{name:'sellPrice',type:'number',value:p.sellPrice},{name:'stock',type:'number',value:p.stock},{name:'category',value:p.category}],onConfirm:(d)=>{ p.name=d.name; p.buyPrice=parseFloat(d.buyPrice)||0; p.sellPrice=parseFloat(d.sellPrice)||0; p.stock=parseInt(d.stock)||0; p.category=d.category; if(d.image)p.image=d.image; saveProducts(); renderProductsMobile(); showToast('Product updated'); }});}));
    }
    function renderAnalysisMobile() { document.getElementById('mobileContent').innerHTML = '<div style="background:white; border-radius:40px; padding:1.4rem;">Analytics (full version)</div>'; }
    function renderSalesMobile() { document.getElementById('mobileContent').innerHTML = '<div style="background:white; border-radius:40px; padding:1.4rem;">Sales History</div>'; }
    function renderAlertsMobile() { let low=products.filter(p=>p.stock<=p.minStock); document.getElementById('mobileContent').innerHTML = '<div style="background:white; border-radius:40px; padding:1.4rem;"><h3>'+__('alertTitle')+'</h3>'+(low.length?low.map(p=>`<div style="margin:0.5rem 0; padding:0.6rem 1rem; background:#fff3e0; border-radius:40px;">${p.name} · ${p.stock} (min ${p.minStock})</div>`).join(''):'<p>'+__('noAlerts')+'</p>')+'</div>'; }
    function renderUsersMobile() { if(!isManager()) return; let h='<div style="background:white; border-radius:40px; padding:1.4rem;"><h3>'+__('userTitle')+'</h3>'; users.forEach(u=>{ h+=`<div class="user-row" style="display:flex; align-items:center; gap:0.8rem; padding:0.7rem 0; border-bottom:1px solid #e2edff;"><div class="user-avatar" style="width:40px; height:40px; border-radius:40px; background:#e6f0fa; display:flex; align-items:center; justify-content:center; overflow:hidden;">${u.profileImage?`<img src="${u.profileImage}" style="width:100%;height:100%;object-fit:cover;">`:'<i class="fas fa-user"></i>'}</div><div style="flex:1;"><strong>${u.name}</strong><br><small>@${u.username} · ${u.role}</small></div><div><i class="fas fa-edit" data-userid="${u.id}" style="color:#1b4f72; cursor:pointer;"></i>${u.id!==currentUser.id?' <i class="fas fa-trash-alt" data-userid="'+u.id+'" style="color:#c0392b; cursor:pointer;"></i>':''}</div></div>`; }); h+=`<button class="btn-small" id="addUserBtn" style="width:100%; margin-top:1rem;">${__('addUser')}</button></div>`; document.getElementById('mobileContent').innerHTML = h; }

    // splash done
    setTimeout(() => { splash.style.display = 'none'; if (!checkLicenseValid() && !getLicense()) { /* trial auto set */ } if (!currentUser) showAuthScreen(); else renderPhoneApp(); }, 1200);
})();
</script>
</body>
</html>
