<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Profit Point · premium POS</title>
    <!-- Font Awesome 6 + Google Fonts Inter + Chart.js 4 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #e6f0fa;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: 100vh;
        }
        #phoneApp {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            box-shadow: 0 20px 50px rgba(0, 40, 70, 0.3);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            border-radius: 32px 32px 0 0;
            overflow: hidden;
        }
        /* wallpaper container */
        .wallpaper-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .wallpaper-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: var(--wallpaper-opacity, 0.2);
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        /* content layers */
        .app-header, .main-content, .bottom-nav, .cart-fab, .cart-modal-overlay, .modal-overlay, .auth-overlay,
        .auth-card-modern, button, input, select, .nav-item-mobile, .chip, .product-tile-mobile {
            position: relative;
            z-index: 2;
        }
        .main-content {
            background: rgba(245, 250, 255, 0.7);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        .cart-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300000;
            padding: 1.5rem;
            animation: fadeScale 0.3s ease;
        }
        .cart-modal-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 40px 70px rgba(0, 30, 50, 0.5);
            border: 1px solid rgba(255,255,240,0.6);
            max-height: 80vh;
            overflow-y: auto;
        }
        .cart-panel { display: none; } /* hide old panel */
        .cart-fab { position: sticky; bottom: 0.8rem; z-index: 100; display: flex; justify-content: center; }
        .cart-btn { background: linear-gradient(145deg, #1b4f72, #0b6b96); color: white; border: none; border-radius: 80px; padding: 1rem 2.2rem; font-size: 1.3rem; font-weight: 700; box-shadow: 0 15px 25px #1b4f7290; display: inline-flex; align-items: center; gap: 14px; cursor: pointer; border: 1px solid #ffffff50; transition: all 0.2s ease; }
        .cart-btn:active { transform: scale(0.94); }
        .cart-badge { background: #fedb9f; color: #0f2b44; border-radius: 60px; padding: 0.2rem 1rem; font-size: 1.1rem; }

        /* modern header */
        .app-header { background: linear-gradient(135deg, rgba(15,43,68,0.96), rgba(27,79,114,0.96)); backdrop-filter: blur(6px); padding: 0.8rem 1rem 0.5rem; border-bottom: 2px solid rgba(255,255,255,0.15); }
        .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.4rem; }
        .logo-area { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 1.4rem; color: white; text-shadow: 0 2px 4px #00000040; }
        .logo-icon { background: #fedb9f; color: #0a3f5e; border-radius: 18px; padding: 6px 10px; font-size: 1.3rem; }
        .date-badge { background: rgba(255,255,255,0.2); backdrop-filter: blur(4px); padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.3); color: white; }
        .brand-row { display: flex; align-items: center; gap: 0.8rem; background: rgba(0,0,0,0.2); padding: 0.2rem 0.8rem 0.2rem 0.2rem; border-radius: 60px; border: 1px solid rgba(255,215,140,0.6); backdrop-filter: blur(4px); max-width: 100%; }
        .shop-logo-preview { width: 44px; height: 44px; border-radius: 44px; background: white; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #0f2b44; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid #fedb9f; overflow: hidden; }
        .shop-logo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .shop-name-display { font-weight: 700; font-size: 1.2rem; color: white; text-shadow: 0 2px 5px rgba(0,0,0,0.5); max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-greeting-modern { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.15); padding: 0.3rem 1rem 0.3rem 0.5rem; border-radius: 60px; margin-top: 0.5rem; border: 1px solid rgba(255,255,255,0.3); }
        .user-info-left { display: flex; align-items: center; gap: 8px; color: white; font-size: 0.9rem; }
        .user-avatar-mini { width: 32px; height: 32px; border-radius: 32px; background: #fedb9f; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid white; }
        .user-avatar-mini img { width:100%; height:100%; object-fit:cover; }
        .top-right-icons { display: flex; gap: 0.6rem; align-items: center; }
        .icon-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 40px; padding: 0.4rem 0.9rem; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s ease; }
        .icon-btn:active, .btn-small:active, .auth-btn:active, .modal-btn:active, .nav-item-mobile:active, .product-tile-mobile:active, .cart-btn:active { transform: scale(0.94); transition: transform 0.1s cubic-bezier(0.2, 0.9, 0.3, 1.2); }
        
        .bottom-nav { display: flex; justify-content: space-around; background: rgba(255,255,255,0.85); backdrop-filter: blur(18px); padding: 0.5rem 0.2rem; border-top: 1px solid #ffffff80; box-shadow: 0 -8px 25px rgba(0,40,70,0.1); border-radius: 40px 40px 0 0; margin-top: auto; }
        .nav-item-mobile { flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; color: #2e4b6e; padding: 8px 0; border-radius: 40px; cursor: pointer; font-weight: 500; transition: all 0.2s ease; }
        .nav-item-mobile i { font-size: 1.5rem; margin-bottom: 2px; }
        .nav-item-mobile.active { background: #1b4f72; color: white; box-shadow: 0 6px 14px #1b4f7240; }
        .nav-item-mobile:active { transform: scale(0.94); background: rgba(27,79,114,0.2); }
        
        .main-content { flex: 1; overflow-y: auto; padding: 1.2rem 1rem 0.8rem; background: rgba(245,250,255,0.7); display: flex; flex-direction: column; scrollbar-width: thin; }
        #toastContainer { position: fixed; bottom: 90px; left: 16px; right: 16px; max-width: 400px; margin: 0 auto; z-index: 999999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { background: #1e3b5c; color: white; padding: 14px 22px; border-radius: 60px; font-weight: 500; box-shadow: 0 15px 30px rgba(0,20,40,0.3); border-left: 6px solid #fedb9f; backdrop-filter: blur(12px); display: flex; align-items: center; gap: 10px; pointer-events: auto; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast.error { border-left-color: #f36; }
        .toast.success { border-left-color: #2ecc71; }
        
        .splash-loading { position: fixed; inset: 0; background: linear-gradient(145deg, #0f2b44, #1b5a82); display: flex; align-items: center; justify-content: center; z-index: 1000000; flex-direction: column; animation: splashFade 0.8s ease-out; }
        @keyframes splashFade { 0% { opacity: 0; } 100% { opacity: 1; } }
        .splash-spinner { width: 90px; height: 90px; border: 6px solid rgba(255,255,255,0.15); border-top: 6px solid #fedb9f; border-radius: 50%; animation: spin 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite; box-shadow: 0 0 25px #fedb9f80; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .splash-text { margin-top: 2rem; color: white; font-size: 2rem; font-weight: 700; letter-spacing: 2px; text-shadow: 0 4px 12px #00000040; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.8; } }
        
        .auth-field { background: white; border-radius: 60px; padding: 0.2rem 1.5rem; margin-bottom: 1.4rem; border: 1px solid #cbdaf0; transition: 0.2s; box-shadow: 0 8px 16px rgba(0,30,70,0.1); }
        .auth-field:focus-within { border-color: #1b4f72; transform: scale(1.02); box-shadow: 0 12px 24px #1b4f7230; }
        .auth-field input, .auth-field select { width: 100%; border: none; background: transparent; padding: 1rem 0; font-size: 1rem; outline: none; }
        .auth-btn { background: linear-gradient(145deg, #1b4f72, #106a94); color: white; border: none; border-radius: 60px; padding: 1.2rem; width: 100%; font-weight: 700; font-size: 1.2rem; cursor: pointer; transition: all 0.15s; box-shadow: 0 15px 25px #0f2b44b3; display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.2); }
        .auth-btn:active { transform: scale(0.96); }
        .auth-switch { text-align: center; color: #1b4f72; cursor: pointer; font-weight: 600; margin-top: 1rem; padding: 0.5rem; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,30,50,0.8); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 200000; padding: 1rem; animation: fadeScale 0.3s ease; }
        .modal-card { background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); border-radius: 56px; padding: 2rem 1.5rem; width: 100%; max-width: 380px; box-shadow: 0 30px 60px #001e32; max-height: 85vh; overflow-y: auto; }
        .modal-card h3 { font-size: 2rem; font-weight: 600; margin-bottom: 1.5rem; color: #1b4f72; display: flex; gap: 8px; }
        .modal-field { background: #f2f8ff; border-radius: 60px; padding: 0.2rem 1.2rem; border: 1px solid #b9d6f5; margin-bottom: 1.2rem; }
        .modal-field input, .modal-field select { width: 100%; border: none; background: transparent; padding: 0.9rem 0; font-size: 1rem; outline: none; }
        .upload-btn { background: #eaf1fb; border: 2px dashed #1b4f72; border-radius: 60px; padding: 0.8rem 1.2rem; text-align: center; color: #1b4f72; font-weight: 600; cursor: pointer; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .upload-btn:active { transform: scale(0.96); }
        .camera-btn { background: #d4e6ff; border: 2px solid #1b4f72; border-radius: 60px; padding: 0.6rem 1rem; cursor: pointer; font-weight: 500; margin-bottom: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 8px; color: #0f2b44; transition: all 0.2s; }
        .camera-btn:active { transform: scale(0.96); }
        .image-preview { width: 70px; height: 70px; border-radius: 20px; object-fit: cover; border: 2px solid #fedb9f; margin: 0 auto 1rem; display: none; background: #f0f5fd; }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }
        .modal-actions { display: flex; gap: 1rem; margin-top: 2rem; }
        .modal-btn { flex: 1; padding: 1rem; border-radius: 60px; border: none; font-weight: 600; background: #1b4f72; color: white; cursor: pointer; font-size: 1rem; transition: all 0.2s; }
        .modal-btn:active { transform: scale(0.94); }
        .modal-btn.secondary { background: #eaf3ff; color: #1b4f72; border: 1px solid #1b4f72; }
        .modal-btn.danger { background: #c0392b; color: white; }
        
        .product-grid-mobile { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1rem 0; }
        .product-tile-mobile { background: rgba(255,255,255,0.95); border-radius: 32px; padding: 1rem 0.5rem; text-align: center; box-shadow: 0 15px 25px rgba(0,0,0,0.1); border: 1px solid #dbeafe; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; }
        .product-tile-mobile:active { transform: scale(0.94); background: #f0f7ff; }
        .product-image-mobile { width: 80px; height: 80px; border-radius: 28px; background: #f0f7ff; display: flex; align-items: center; justify-content: center; margin-bottom: 0.5rem; border: 2px solid #fedb9f; overflow: hidden; }
        .product-image-mobile img { width: 100%; height: 100%; object-fit: cover; }
        .product-price-mobile { font-weight: 800; color: #0f2b44; font-size: 1.3rem; }
        .product-name-mobile { font-weight: 600; font-size: 0.95rem; margin: 0.2rem 0; }
        .stock-badge-mobile { background: #deecfd; border-radius: 50px; padding: 0.2rem 0.8rem; font-size: 0.75rem; display: inline-block; margin-top: 0.2rem; }
        
        .btn-small { background: #1b4f72; color: white; border:none; border-radius:60px; padding:0.8rem 1.6rem; font-weight:600; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
        .btn-small:active { transform: scale(0.94); }
        .chip { background: #ecf5ff; border-radius: 60px; padding: 0.7rem 1.4rem; cursor: pointer; font-weight: 500; border: 1px solid #c2daf5; display: inline-block; transition: all 0.2s; }
        .chip:active { transform: scale(0.94); }
        .chip.active { background: #1b4f72; color: white; border-color: #1b4f72; }
        .payment-option { background: white; border-radius: 60px; padding: 0.8rem 1.4rem; border:1px solid #c2daf5; cursor:pointer; display: inline-block; transition: all 0.2s; }
        .payment-option:active { transform: scale(0.94); }
        .payment-option.active { background: #1b4f72; color: white; }
        
        .user-avatar { width: 40px; height: 40px; border-radius: 40px; background: #e6f0fa; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #fedb9f; }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-row { display: flex; align-items: center; gap: 0.8rem; padding: 0.7rem 0; border-bottom: 1px solid #e2edff; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; margin: 1rem 0; }
        .stat-card { background: white; border-radius: 28px; padding: 1.2rem; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.05); border: 1px solid #e2edff; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #1b4f72; line-height: 1.2; }
        .stat-label { font-size: 0.8rem; color: #64748b; margin-top: 0.3rem; }
        .chart-container { height: 200px; margin: 1.5rem 0; position: relative; }
        .filter-tabs { display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; }
        .filter-tab { background: #ecf5ff; border-radius: 40px; padding: 0.5rem 1.2rem; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: 1px solid #c2daf5; transition: all 0.2s; }
        .filter-tab:active { transform: scale(0.94); }
        .filter-tab.active { background: #1b4f72; color: white; border-color: #1b4f72; }
        .sale-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #eef2f6; }
        .sale-item:last-child { border-bottom: none; }
        .sale-info { flex: 1; }
        .sale-date { font-size: 0.8rem; color: #64748b; display: flex; align-items: center; gap: 4px; }
        .sale-amount { font-weight: 700; font-size: 1.2rem; color: #1b4f72; }
        .sale-payment { background: #e8f0fe; padding: 0.2rem 1rem; border-radius: 40px; font-size: 0.75rem; font-weight: 600; color: #1b4f72; }
        .sale-products { font-size: 0.85rem; color: #475569; margin-top: 4px; }
        
        .trial-badge { background: #fee9b0; color: #7a4f0e; border-radius: 40px; padding: 0.3rem 1.2rem; font-size: 0.8rem; font-weight: 600; margin-left: 0.5rem; }
        .wallpaper-control { display: flex; align-items: center; gap: 12px; margin: 1rem 0; background: rgba(255,255,255,0.5); border-radius: 60px; padding: 0.8rem 1.2rem; border: 1px solid #d4e2f0; }
        .wallpaper-control i { color: #1b4f72; font-size: 1.2rem; }
        .wallpaper-control input[type=range] { flex: 1; height: 6px; border-radius: 10px; background: #c1d9f0; }
        .wallpaper-upload { background: #eaf1fb; border: 2px dashed #1b4f72; border-radius: 60px; padding: 0.8rem 1.2rem; text-align: center; color: #1b4f72; font-weight: 600; cursor: pointer; margin: 1rem 0; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .wallpaper-upload:active { transform: scale(0.96); }
        :root { --wallpaper-opacity: 0.2; }
    </style>
</head>
<body>
    <div id="phoneApp"></div>
    <div id="toastContainer"></div>
    
    <!-- splash loading screen -->
    <div id="splashLoading" class="splash-loading" style="display: flex;">
        <div class="splash-spinner"></div>
        <div class="splash-text">Profit Point</div>
    </div>

<script>
(function() {
    const toastContainer = document.getElementById('toastContainer');
    const splash = document.getElementById('splashLoading');

    // ========== LICENSING SYSTEM ==========
    const LICENSE_KEY = 'profitpoint_license';
    const TRIAL_DURATION = 60 * 1000; // 1 minute trial (60000 ms)
    const MONTH_DURATION = 30 * 24 * 60 * 60 * 1000; // 30 days
    const PRODUCT_KEY = '12345ABCDE';

    function getLicense() {
        const lic = localStorage.getItem(LICENSE_KEY);
        if (!lic) return null;
        try { return JSON.parse(lic); } catch { return null; }
    }
    
    function saveLicense(lic) { 
        localStorage.setItem(LICENSE_KEY, JSON.stringify(lic)); 
    }

    function checkLicenseValid() {
        const lic = getLicense();
        if (!lic) {
            // First launch: start trial
            const newLic = { type: 'trial', start: Date.now(), duration: TRIAL_DURATION };
            saveLicense(newLic);
            return true;
        }
        if (lic.type === 'trial') {
            const elapsed = Date.now() - lic.start;
            return elapsed < lic.duration;
        } else if (lic.type === 'full') {
            const elapsed = Date.now() - lic.start;
            return elapsed < lic.duration;
        }
        return false;
    }

    function getRemainingMs() {
        const lic = getLicense();
        if (!lic) return 0;
        const elapsed = Date.now() - lic.start;
        const remaining = lic.duration - elapsed;
        return remaining > 0 ? remaining : 0;
    }

    function formatRemaining(ms) {
        if (ms <= 0) return 'Expired';
        const days = Math.floor(ms / (24*3600*1000));
        const hours = Math.floor((ms % (24*3600*1000)) / (3600*1000));
        const minutes = Math.floor((ms % (3600*1000)) / (60*1000));
        if (days > 0) return `${days}d ${hours}h`;
        if (hours > 0) return `${hours}h ${minutes}m`;
        return `${minutes}m`;
    }

    function showProductKeyModal(callback) {
        const overlay = document.createElement('div'); 
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
            <div class="modal-card">
                <h3><i class="fas fa-key"></i> Activation Required</h3>
                <p style="margin-bottom:1.5rem; color:#1e293b;">Trial expired. Enter product key for a period  of 30 days.</p>
                <div class="modal-field">
                    <input type="text" id="productKeyInput" placeholder="Enter product key" value="" style="width:100%;">
                </div>
                <div class="modal-actions">
                    <button class="modal-btn secondary" id="cancelKey">Cancel</button>
                    <button class="modal-btn" id="submitKey">Activate</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);

        document.getElementById('submitKey').addEventListener('click', (e) => {
            e.preventDefault();
            const val = document.getElementById('productKeyInput').value.trim();
            if (val === PRODUCT_KEY) {
                const newLic = { type: 'full', start: Date.now(), duration: MONTH_DURATION };
                saveLicense(newLic);
                overlay.remove();
                if (callback) callback(true);
                showToast('License activated for 30 days', 'success');
                if (!currentUser) showAuthScreen(); else renderPhoneApp();
            } else {
                showToast('Invalid key', 'error');
            }
        });

        document.getElementById('cancelKey').addEventListener('click', (e) => {
            e.preventDefault();
            overlay.remove();
            if (callback) callback(false);
            renderBlockScreen();
        });
    }

    function renderBlockScreen() {
        const container = document.getElementById('phoneApp');
        if (!container) return;
        container.innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background:#0f2b44; color:white; padding:2rem;">
                <i class="fas fa-lock" style="font-size:4rem; margin-bottom:1rem;"></i>
                <h2 style="margin-bottom:1rem;">License Required</h2>
                <p style="margin:1rem 0; text-align:center;">Trial expired. Please enter product key.</p>
                <button class="auth-btn" id="unlockBlockBtn" style="width:auto; padding:1rem 2rem;">Enter Key</button>
            </div>
        `;
        document.getElementById('unlockBlockBtn')?.addEventListener('click', ()=>{
            showProductKeyModal((success)=>{ if(success) { renderPhoneApp(); } });
        });
    }

    // splash then check license
    setTimeout(() => {
        splash.style.display = 'none';
        if (!checkLicenseValid()) {
            if (!currentUser) {
                showAuthScreen();
            } else {
                showProductKeyModal();
            }
        } else {
            if (!currentUser) showAuthScreen(); else renderPhoneApp();
        }
    }, 1200);

    // ========== UTILITIES ==========
    function showToast(msg, type='success') { 
        const t=document.createElement('div'); 
        t.className=`toast ${type}`; 
        t.innerHTML = `<i class="fas ${type==='error'?'fa-circle-exclamation':type==='success'?'fa-circle-check':'fa-info-circle'}"></i> ${msg}`; 
        toastContainer.appendChild(t); 
        setTimeout(()=>t.remove(), 4000); 
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    async function captureFromCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    resolve();
                };
            });
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            stream.getTracks().forEach(track => track.stop());
            return canvas.toDataURL('image/jpeg');
        } catch (error) {
            console.error('Camera error:', error);
            showToast('Camera access denied', 'error');
            return null;
        }
    }

    function applyWallpaper(parentElement) {
        let container = parentElement.querySelector('.wallpaper-container');
        if (!container) {
            container = document.createElement('div');
            container.className = 'wallpaper-container';
            const img = document.createElement('img');
            img.className = 'wallpaper-image';
            img.src = wallpaperImage;
            img.alt = 'wallpaper';
            img.style.opacity = wallpaperOpacity;
            container.appendChild(img);
            parentElement.prepend(container);
        } else {
            const img = container.querySelector('.wallpaper-image');
            if (img) {
                img.src = wallpaperImage;
                img.style.opacity = wallpaperOpacity;
            }
        }
    }

    function showEnhancedModal(options) {
        const { title, fields, onConfirm, withImage = false, imageLabel = 'Upload image', showDelete = false, onDelete, extraContent = '', onExtraInit } = options;
        const overlay = document.createElement('div'); 
        overlay.className = 'modal-overlay';
        let imageData = null;
        let html = `<div class="modal-card"><h3><i class="fas fa-pen-alt"></i> ${title}</h3>`;
        if (withImage) {
            html += `<div class="image-preview" id="modalImagePreview"></div>
                     <div class="upload-btn" id="modalUploadBtn"><i class="fas fa-cloud-upload-alt"></i> ${imageLabel}</div>
                     <div class="camera-btn" id="modalCameraBtn"><i class="fas fa-camera"></i> ${__('camera')}</div>
                     <input type="file" id="modalFileInput" accept="image/*" style="display:none;">`;
        }
        fields.forEach(f => {
            if (f.type === 'select') {
                html += `<div class="modal-field"><select id="modal-${f.name}">${f.options.map(opt => `<option value="${opt.value}" ${f.value === opt.value ? 'selected' : ''}>${opt.label}</option>`).join('')}</select></div>`;
            } else {
                html += `<div class="modal-field"><input type="${f.type || 'text'}" id="modal-${f.name}" placeholder="${f.placeholder}" value="${f.value || ''}"></div>`;
            }
        });
        html += extraContent;
        html += `<div class="modal-actions">`;
        if (showDelete) {
            html += `<button class="modal-btn danger" id="modalDelete">${__('deleteUser')}</button>`;
        }
        html += `<button class="modal-btn secondary" id="modalCancel">${__('cancel')}</button>
                 <button class="modal-btn" id="modalConfirm">${__('save')}</button>
                 </div></div>`;
        overlay.innerHTML = html;
        document.body.appendChild(overlay);

        if (withImage) {
            const fileInput = document.getElementById('modalFileInput');
            const preview = document.getElementById('modalImagePreview');
            const cameraBtn = document.getElementById('modalCameraBtn');
            
            document.getElementById('modalUploadBtn').addEventListener('click', (e) => {
                e.preventDefault();
                fileInput.click();
            });
            
            if (cameraBtn) {
                cameraBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    const b64 = await captureFromCamera();
                    if (b64) {
                        imageData = b64;
                        preview.style.display = 'block';
                        preview.innerHTML = `<img src="${b64}">`;
                    }
                });
            }
            
            fileInput.addEventListener('change', async (e) => {
                if (e.target.files[0]) {
                    const b64 = await fileToBase64(e.target.files[0]);
                    imageData = b64;
                    preview.style.display = 'block';
                    preview.innerHTML = `<img src="${b64}">`;
                }
            });
        }

        document.getElementById('modalCancel').addEventListener('click', (e) => {
            e.preventDefault();
            overlay.remove();
        });
        
        if (showDelete && onDelete) {
            document.getElementById('modalDelete').addEventListener('click', (e) => {
                e.preventDefault();
                if (confirm(__('confirmDelete'))) {
                    overlay.remove();
                    onDelete();
                }
            });
        }
        
        document.getElementById('modalConfirm').addEventListener('click', (e) => {
            e.preventDefault();
            const data = {};
            fields.forEach(f => {
                const element = document.getElementById(`modal-${f.name}`);
                if (element) data[f.name] = element.value;
            });
            if (withImage) data.image = imageData || '';
            overlay.remove();
            onConfirm(data);
        });

        if (onExtraInit) setTimeout(onExtraInit, 100);
    }

            });
        });

        overlay.querySelector('#closeCartModal').addEventListener('click', (e) => {
            e.preventDefault();
            overlay.remove();
        });

        overlay.querySelector('#modalCompleteSale').addEventListener('click', (e) => {
            e.preventDefault();
            if (cart.length === 0) { showToast(__('emptyCart'), 'error'); overlay.remove(); return; }
            let finalTotal = cart.reduce((sum,i) => sum + i.price * i.qty, 0);
            let saleItems = cart.map(i => ({ productId: i.productId, name: i.name, qty: i.qty, price: i.price }));
            saleItems.forEach(si => {
                let prod = products.find(p => p.id === si.productId);
                if (prod) prod.stock -= si.qty;
            });
            saveProducts();
            let saleRecord = { 
                id: Date.now(), 
                items: saleItems, 
                finalTotal, 
                payment: selectedPayment, 
                customerId: selectedCustomer, 
                date: new Date().toISOString() 
            };
            sales.push(saleRecord);
            saveSales();
            cart = []; saveCart();
            overlay.remove();
            showToast('Sale completed');
            renderPosMobile();
        });

        overlay.querySelectorAll('.fa-trash').forEach(icon => {
            icon.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                let idx = icon.dataset.cartidx;
                if (idx !== undefined) { cart.splice(idx, 1); saveCart(); overlay.remove(); showCartModal(); }
            });
        });

        const select = document.getElementById('modalCustomerSelect');
        if (select) {
            select.addEventListener('change', (e) => { selectedCustomer = e.target.value; });
        }
    }

    // ========== ANALYSIS PAGE ==========
    function renderAnalysisMobile() {
        let totalRevenue = sales.reduce((acc, s) => acc + (s.finalTotal || 0), 0);
        let totalCost = 0;
        let productSales = {};
        
        sales.forEach(s => { 
            if (s.items) {
                s.items.forEach(itm => { 
                    let prod = products.find(p => p.id === itm.productId) || { buyPrice: 0 }; 
                    totalCost += (prod.buyPrice || 0) * itm.qty;
                    if (!productSales[itm.productId]) {
                        productSales[itm.productId] = { qty: 0, name: itm.name };
                    }
                    productSales[itm.productId].qty += itm.qty;
                });
            }
        });
        
        let totalExpenses = expenses.reduce((acc, e) => acc + (e.amount || 0), 0);
        let grossProfit = totalRevenue - totalCost;
        let netProfit = grossProfit - totalExpenses;
        let profitMargin = totalRevenue > 0 ? ((netProfit / totalRevenue) * 100).toFixed(1) : 0;
        
        let topProduct = { name: 'None', qty: 0 };
        Object.values(productSales).forEach(p => {
            if (p.qty > topProduct.qty) {
                topProduct = p;
            }
        });
        
        let transactionCount = sales.length;
        let avgOrderValue = transactionCount > 0 ? (totalRevenue / transactionCount).toFixed(0) : 0;
        
        let last7Days = [];
        let dailyRevenue = [];
        for (let i = 6; i >= 0; i--) {
            let date = new Date();
            date.setDate(date.getDate() - i);
            let dateStr = date.toLocaleDateString('en', { weekday: 'short' });
            last7Days.push(dateStr);
            
            let dayTotal = sales
                .filter(s => new Date(s.date).toDateString() === date.toDateString())
                .reduce((sum, s) => sum + s.finalTotal, 0);
            dailyRevenue.push(dayTotal);
        }

        let html = `
            <div class="analytics-card" style="background:white; border-radius:40px; padding:1.4rem; margin-bottom:1rem;">
                <h3 style="margin-bottom:1rem;"><i class="fas fa-chart-line"></i> ${__('analysis')}</h3>
                
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">TSh ${totalRevenue.toLocaleString()}</div><div class="stat-label">${__('revenue')}</div></div>
                    <div class="stat-card"><div class="stat-value">TSh ${netProfit.toLocaleString()}</div><div class="stat-label">${__('profit')}</div></div>
                    <div class="stat-card"><div class="stat-value">${profitMargin}%</div><div class="stat-label">${__('profitMargin')}</div></div>
                    <div class="stat-card"><div class="stat-value">${transactionCount}</div><div class="stat-label">${__('transactions')}</div></div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">TSh ${avgOrderValue}</div><div class="stat-label">${__('averageOrder')}</div></div>
                    <div class="stat-card"><div class="stat-value">${topProduct.name}</div><div class="stat-label">${__('topProduct')} (${topProduct.qty} pcs)</div></div>
                </div>
                
                <div class="chart-container"><canvas id="revenueChart"></canvas></div>
            </div>
            
            <div class="analytics-card" style="background:white; border-radius:40px; padding:1.4rem;">
                <h4 style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                    <span>${__('expenses')}</span>
                    <button class="btn-small" id="addExpenseBtn" style="padding:0.4rem 1.2rem;"><i class="fas fa-plus"></i> ${__('addExpense')}</button>
                </h4>
                ${expenses.length === 0 ? 
                    `<p style="text-align:center; color:#64748b; padding:1rem;">No expenses recorded</p>` : 
                    expenses.map(e => `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:0.8rem 0; border-bottom:1px solid #eef2f6;">
                            <span>${e.desc || '-'}</span>
                            <span style="font-weight:600;">TSh ${e.amount}</span>
                        </div>
                    `).join('')}
            </div>
        `;
        
        document.getElementById('mobileContent').innerHTML = html;

        const ctx = document.getElementById('revenueChart')?.getContext('2d');
        if (ctx) {
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last7Days,
                    datasets: [{
                        label: 'Daily Revenue',
                        data: dailyRevenue,
                        borderColor: '#1b4f72',
                        backgroundColor: 'rgba(27,79,114,0.1)',
                        tension: 0.3,
                        fill: true,
                        pointBackgroundColor: '#fedb9f',
                        pointBorderColor: '#1b4f72',
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } } }
                }
            });
        }

        document.getElementById('addExpenseBtn')?.addEventListener('click', (e)=>{
            e.preventDefault();
            showEnhancedModal({ 
                title: __('addExpense'), 
                fields: [
                    { name: 'desc', placeholder: __('desc'), type: 'text' },
                    { name: 'amount', placeholder: __('amount'), type: 'number' }
                ], 
                onConfirm: (data) => { 
                    let amt = parseFloat(data.amount) || 0; 
                    expenses.push({ 
                        id: Date.now(), 
                        desc: data.desc || 'expense', 
                        amount: amt, 
                        date: new Date().toISOString() 
                    }); 
                    saveExpenses(); 
                    renderAnalysisMobile(); 
                    showToast('Expense added'); 
                } 
            });
        });
    }

    // ========== SALES PAGE ==========
    function renderSalesMobile() {
        let filter = 'all';
        let filteredSales = [...sales].sort((a,b) => new Date(b.date) - new Date(a.date));
        
        const filterSales = () => {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const weekAgo = new Date(today); weekAgo.setDate(weekAgo.getDate() - 7);
            const monthAgo = new Date(today); monthAgo.setMonth(monthAgo.getMonth() - 1);
            
            if (filter === 'today') return filteredSales.filter(s => new Date(s.date) >= today);
            if (filter === 'week') return filteredSales.filter(s => new Date(s.date) >= weekAgo);
            if (filter === 'month') return filteredSales.filter(s => new Date(s.date) >= monthAgo);
            return filteredSales;
        };
        
        const renderSalesContent = () => {
            const displaySales = filterSales();
            const totalAmount = displaySales.reduce((sum, s) => sum + s.finalTotal, 0);
            
            let html = `
                <div class="sales-card" style="background:white; border-radius:40px; padding:1.4rem;">

                        <div style="font-size:0.9rem; color:#64748b;">Total Sales</div>
                        <div style="font-size:2rem; font-weight:700; color:#1b4f72;">TSh ${totalAmount.toLocaleString()}</div>

                    ${displaySales.length === 0 ?

                        displaySales.map(sale => {
                            const date = new Date(sale.date);
                            const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                            const dateStr = date.toLocaleDateString();
                            const productNames = sale.items.map(i => i.name).join(', ');
                            
                            return `
                                <div class="sale-item">
                                    <div class="sale-info">
                                        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                                            <span class="sale-date"><i class="far fa-calendar"></i> ${dateStr} ${timeStr}</span>

                                        <div class="sale-products">${productNames.substring(0, 50)}${productNames.length > 50 ? '...' : ''}</div>
                                    </div>
                                    <div class="sale-amount">TSh ${sale.finalTotal}</div>
                                </div>
                            `;

                </div>
            `;
            
            document.getElementById('mobileContent').innerHTML = html;
            
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    e.preventDefault();
                    filter = tab.dataset.filter;
                    renderSalesContent();
                });
            });

                    <div class="user-actions">
                        <i class="fas fa-edit" data-userid="${u.id}" title="${__('editUser')}"></i>
                        ${u.id !== currentUser.id ? `<i class="fas fa-trash-alt" data-userid="${u.id}" title="${__('deleteUser')}"></i>` : ''}
                    </div>
                </div>
            `;
        });
        html += `<button class="btn-small" id="addUserBtn" style="width:100%; margin-top:1rem;">${__('addUser')}</button></div>`;
        document.getElementById('mobileContent').innerHTML = html;
        
        document.getElementById('addUserBtn')?.addEventListener('click', (e)=>{
            e.preventDefault();
            showEnhancedModal({
                title: __('newUser'),
                withImage: true,
                imageLabel: __('profileImage'),
                fields: [
                    { name: 'fullName', placeholder: __('fullName'), type: 'text' },
                    { name: 'username', placeholder: __('username'), type: 'text' },
                    { name: 'password', placeholder: __('password'), type: 'password' },
                    { name: 'role', type: 'select', options: [{ value: 'teller', label: __('teller') }, { value: 'manager', label: __('manager') }] },
                    { name: 'phone', placeholder: __('phoneNumber'), type: 'text' }
                ],
                onConfirm: (data) => {
                    if (!data.username || !data.password) { showToast('Required fields missing', 'error'); return; }
                    const newUser = { 
                        id:'u'+Date.now(), 
                        username: data.username, 
                        password: data.password, 
                        role: data.role, 
                        name: data.fullName || data.username, 
                        phone: data.phone || '', 
                        profileImage: data.image || null, 
                        createdAt: new Date().toISOString() 
                    };
                    users.push(newUser); 
                    saveUsers();
                    renderUsersMobile(); 
                    showToast('User added');
                }
            });
        });
        
        document.querySelectorAll('.fa-edit').forEach(icon => {
            icon.addEventListener('click', (e) => {
                e.preventDefault();
                let uid = icon.dataset.userid;
                let user = users.find(u => u.id === uid);
                if (!user) return;
                showEnhancedModal({
                    title: __('editUser'),
                    withImage: true,
                    imageLabel: __('profileImage'),
                    fields: [
                        { name: 'fullName', placeholder: __('fullName'), type: 'text', value: user.name },
                        { name: 'username', placeholder: __('username'), type: 'text', value: user.username },
                        { name: 'password', placeholder: __('password'), type: 'password', value: user.password },
                        { name: 'role', type: 'select', options: [{ value: 'teller', label: __('teller') }, { value: 'manager', label: __('manager') }], value: user.role },
                        { name: 'phone', placeholder: __('phoneNumber'), type: 'text', value: user.phone || '' }
                    ],
                    showDelete: true,
                    onDelete: () => {
                        if (user.id === currentUser.id) { showToast('Cannot delete yourself', 'error'); return; }
                        users = users.filter(u => u.id !== uid); 
                        saveUsers(); 
                        renderUsersMobile(); 
                        showToast('User deleted');
                    },
                    onConfirm: (data) => {
                        user.name = data.fullName || user.name;
                        user.username = data.username;
                        if (data.password) user.password = data.password;
                        user.role = data.role;
                        user.phone = data.phone || '';
                        if (data.image) user.profileImage = data.image;
                        saveUsers();
                        renderUsersMobile(); 
                        showToast('User updated');
                    }
                });
            });
        });
        
        document.querySelectorAll('.fa-trash-alt').forEach(icon => {
            icon.addEventListener('click', (e) => {
                e.preventDefault();
                let uid = icon.dataset.userid;
                let user = users.find(u => u.id === uid);
                if (!user) return;
                if (user.id === currentUser.id) { showToast('Cannot delete yourself', 'error'); return; }
                if (confirm(__('confirmDelete'))) { 
                    users = users.filter(u => u.id !== uid); 
                    saveUsers(); 
                    renderUsersMobile(); 
                    showToast('User deleted'); 
                }
            });
        });
    }
})();
</script>
</body>
</html>
